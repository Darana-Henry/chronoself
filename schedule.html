function buildGrid() {
  const grid = document.getElementById('grid');
  const PAD  = 2;

  for (let d = 0; d < 7; d++) {
    const col = document.createElement('div');
    col.className = 'day-col' + (d === TODAY_IDX ? ' today' : '');

    // Filter blocks for this day
    const dayBlocks = BLOCKS.filter(b => {
      const days = b.days ?? [b.day ?? 0];
      if (!days.includes(d)) return false;
      if (b.altSat && d === 5 && isoWeek(WEEK_DATES[5]) % 2 === 0) return false;
      return true;
    });

    layoutDayBlocks(dayBlocks).forEach(({ b, lane, total }) => {
      const startMin = toMins(b.start);
      const endMin   = toMins(b.end);
      const durMin   = endMin - startMin;
      if (durMin <= 0) return;

      const ev = document.createElement('div');
      ev.className    = `ev ${b.category}`;
      ev.style.top    = `${(startMin / 60) * HOUR_H}px`;
      ev.style.height = `${(durMin   / 60) * HOUR_H}px`;
      ev.style.left   = `calc(${(lane / total) * 100}% + ${PAD}px)`;
      ev.style.width  = `calc(${(1 / total) * 100}% - ${PAD * 2}px)`;

      const title = document.createElement('span');
      title.className   = 'ev-title';
      title.textContent = b.label;
      ev.appendChild(title);

      if (b.sublabel && durMin >= 30) {
        const s = document.createElement('span');
        s.className   = 'ev-sublabel';
        s.textContent = b.sublabel;
        ev.appendChild(s);
      }
      if (durMin >= 30) {
        const t = document.createElement('span');
        t.className   = 'ev-time';
        t.textContent = `${fmt24(b.start)} – ${fmt24(b.end)}`;
        ev.appendChild(t);
      }
      col.appendChild(ev);
    });

    grid.appendChild(col);
  }
}

//  TRACKER — STORAGE
// ═══════════════════════════════════════════════════
function trGetState(dateStr, key) {
  return localStorage.getItem(`chrono_${dateStr}_${key}`); // '1'=checked, 'x'=discarded, null=unchecked
}
function trSetState(dateStr, key, val) {
  val ? localStorage.setItem(`chrono_${dateStr}_${key}`, val)
      : localStorage.removeItem(`chrono_${dateStr}_${key}`);
  fsPushTracker(dateStr);
}
function trIsChecked(dateStr, key) { return trGetState(dateStr, key) === '1'; }
function trMonthKey(year, month, key) {
  return `chrono_month_${year}-${String(month+1).padStart(2,'0')}_${key}`;
}
function trMonthGet(year, month, key) {
  return localStorage.getItem(trMonthKey(year, month, key)) === '1';
}
function trMonthSet(year, month, key, val) {
  val ? localStorage.setItem(trMonthKey(year, month, key), '1')
      : localStorage.removeItem(trMonthKey(year, month, key));
}

// ═══════════════════════════════════════════════════
//  TRACKER — DAILY TABLE  (rows = dates, cols = activities)
// ═══════════════════════════════════════════════════
function trDayIdx(date) { return (date.getDay() + 6) % 7; } // 0=Mon…6=Sun

function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const y1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - y1) / 86400000) + 1) / 7);
}

function trApplicable(act, date) {
  if (act.seasonStart) {
    const d = date.toISOString().split('T')[0];
    return d >= act.seasonStart && d <= act.seasonEnd;
  }
  if (act.days === null) return true;
  if (act.days === 'div3')      return date.getDate() % 3 === 0;
  if (act.days === 'biweeksat') return date.getDay() === 6 && isoWeek(date) % 2 === 1;
  return act.days.includes(trDayIdx(date));
}

function buildTracker() {
  const table = document.getElementById('tracker-table');
  if (!table) return;
  table.innerHTML = '';

  const now     = new Date();
  const todayDs = now.toISOString().split('T')[0];

  // 5 future + today + 29 past = 35 rows; future rows let you pre-fill upcoming days
  const dates = [];
  for (let i = -5; i <= 29; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i); dates.push(d);
  }

  // ── Header ─────────────────────────────
  const thead = table.createTHead();
  const hrow  = thead.insertRow();

  const thD = document.createElement('th');
  thD.textContent = 'Date'; hrow.appendChild(thD);

  const thP = document.createElement('th');
  thP.textContent = '%'; hrow.appendChild(thP);

  ACTIVITIES.forEach(act => {
    const th  = document.createElement('th');
    const dot = document.createElement('span');
    dot.style.cssText = `display:inline-block;width:5px;height:5px;border-radius:50%;background:${TR_COLORS[act.cat]||'#5f6368'};margin-right:5px;vertical-align:middle;flex-shrink:0;`;
    th.append(dot, act.label);
    hrow.appendChild(th);
  });

  // ── Body ───────────────────────────────
  const tbody = table.createTBody();
  dates.forEach(date => {
    const ds      = date.toISOString().split('T')[0];
    const isToday  = ds === todayDs;
    const isFuture = ds > todayDs;
    const row      = tbody.insertRow();
    if (isToday)  row.classList.add('tr-today');
    if (isFuture) row.classList.add('tr-future');

    // Date cell
    const tdDate = row.insertCell();
    tdDate.className   = 'tr-date';
    tdDate.textContent = date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

    // Compute & render %
    const appActs  = ACTIVITIES.filter(a => trApplicable(a, date));
    const pctClass = p => p === 0 ? 'p0' : p < 50 ? 'plow' : p < 100 ? 'pmid' : 'phi';
    const pctText  = p => p === 0 ? '—' : `${p}%`;
    const tdPct = row.insertCell();
    tdPct.id = `trpct-${ds}`;
    const refreshPct = () => {
      const disc   = appActs.filter(a => trGetState(ds, a.key) === 'x').length;
      const active = appActs.length - disc;
      const done   = appActs.filter(a => trGetState(ds, a.key) === '1').length;
      const p      = active ? Math.round(done / active * 100) : 0;
      tdPct.className   = `tr-pct ${pctClass(p)}`;
      tdPct.textContent = pctText(p);
    };
    refreshPct();

    // Activity cells
    ACTIVITIES.forEach(act => {
      const td      = row.insertCell();
      const applies = trApplicable(act, date);

      if (!applies) {
        td.className = 'tr-cell na';
      } else {
        const state = trGetState(ds, act.key);
        td.className = 'tr-cell' + (state === '1' ? ' checked' : state === 'x' ? ' discarded' : '');
        td.addEventListener('click', () => {
          const cur  = trGetState(ds, act.key);
          const next = cur === null ? '1' : cur === '1' ? 'x' : null;
          trSetState(ds, act.key, next);
          td.className = 'tr-cell' + (next === '1' ? ' checked' : next === 'x' ? ' discarded' : '');
          refreshPct();
        });
      }
    });
  });

}

function buildTrackerMonthly() {
  const el = document.getElementById('tracker-monthly-content');
  if (!el) return;
  el.innerHTML = '';

  const now  = new Date();
  const year = now.getFullYear();
  const curM = now.getMonth();
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  // Count how many months already have each travel type checked (year budget)
  const CAR_MAX = 3, FLIGHT_MAX = 1;
  let carUsed = 0, flightUsed = 0;
  for (let i = 0; i < 12; i++) {
    if (trMonthGet(year, i, 'travel_car'))    carUsed++;
    if (trMonthGet(year, i, 'travel_flight')) flightUsed++;
  }

  for (let q = 0; q < 4; q++) {
    const section = document.createElement('div');
    section.className = 'tr-quarter-section';

    const ql = document.createElement('div');
    ql.className   = 'tr-quarter-label';
    ql.textContent = `Q${q+1}  ·  ${MONTHS[q*3].slice(0,3)} – ${MONTHS[q*3+2].slice(0,3)}  ${year}`;
    section.appendChild(ql);

    const grid = document.createElement('div');
    grid.className = 'tr-month-grid';

    for (let m = q*3; m < q*3+3; m++) {
      const isCur  = m === curM;
      const isPast = m < curM;

      const carOn    = trMonthGet(year, m, 'travel_car');
      const flightOn = trMonthGet(year, m, 'travel_flight');
      const anyTravelOn = carOn || flightOn;

      const card = document.createElement('div');
      card.className = 'tr-month-card' + (isCur ? ' is-current' : '') + (isPast ? ' is-past' : '');

      // Month name + travel badge
      const nameRow = document.createElement('div');
      nameRow.className = 'tr-month-name' + (isCur ? ' cur' : '');
      nameRow.textContent = MONTHS[m];
      if (carOn || flightOn) {
        const tBadge = document.createElement('span');
        tBadge.style.cssText = 'font-size:11px;color:rgba(255,200,77,0.70);';
        tBadge.textContent = carOn ? '🚗' : '✈';
        nameRow.appendChild(tBadge);
      }
      card.appendChild(nameRow);

      const items = document.createElement('div');
      items.className = 'tr-month-items';

      const isOddMonth  = (m + 1) % 2 === 1;
      const isEvenMonth = (m + 1) % 2 === 0;

      // Travel rows only appear on past months if they were actually checked
      const monthItems = [
        { key:'event_dinner', label:'Event + Dinner'                          },
        { key:'bathroom',     label:'Bathroom'                                },
        ...(isOddMonth  ? [{ key:'haircut', label:'Haircut'  }] : []),
        ...(isEvenMonth ? [{ key:'carwash', label:'Car Wash' }] : []),
        ...(!isPast || carOn    ? [{ key:'travel_car',    label:'Travel 🚗', travelType:'car'    }] : []),
        ...(!isPast || flightOn ? [{ key:'travel_flight', label:'Travel ✈',  travelType:'flight' }] : []),
      ];

      monthItems.forEach(({ key, label, travelType = null }) => {
        const isTravel = !!travelType;
        const isDone   = trMonthGet(year, m, key);

        let disabled = false;
        if (!isTravel) {
          disabled = anyTravelOn;
        } else if (travelType === 'car') {
          // Locked if the other type is on this month, or year budget is full
          disabled = flightOn || (carUsed >= CAR_MAX && !carOn);
        } else {
          disabled = carOn || (flightUsed >= FLIGHT_MAX && !flightOn);
        }

        const row = document.createElement('div');
        row.className = 'tr-month-item' +
          (isDone   ? ' done'    : '') +
          (disabled ? ' disabled': '') +
          (isTravel ? ' travel'  : '');

        const box = document.createElement('div'); box.className = 'tr-mi-box';
        const lbl = document.createElement('div'); lbl.className = 'tr-mi-lbl'; lbl.textContent = label;
        row.append(box, lbl);

        if (!disabled) {
          row.addEventListener('click', () => {
            const on = row.classList.toggle('done');
            trMonthSet(year, m, key, on);
            if (isTravel) buildTrackerMonthly();
          });
        }
        items.appendChild(row);
      });

      card.appendChild(items);
      grid.appendChild(card);
    }

    section.appendChild(grid);
    el.appendChild(section);
  }
}

function buildTrackerStreaks() {
  const el = document.getElementById('tracker-streaks-content');
  if (!el) return;
  el.innerHTML = '';

  const now     = new Date();
  const todayDs = now.toISOString().split('T')[0];
  const dates   = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - i); dates.push(d);
  }

  // ── Overall completion area chart ───────────────────────
  const chartSec = document.createElement('div');
  chartSec.className = 'streaks-chart-section';
  const chartLbl = document.createElement('div');
  chartLbl.className = 'streaks-section-label';
  chartLbl.textContent = 'Overall Completion · last 30 days';
  chartSec.appendChild(chartLbl);

  const pcts = dates.map(date => {
    const ds   = date.toISOString().split('T')[0];
    const app  = ACTIVITIES.filter(a => trApplicable(a, date));
    const disc = app.filter(a => trGetState(ds, a.key) === 'x').length;
    const active = app.length - disc;
    return active ? app.filter(a => trGetState(ds, a.key) === '1').length / active : 0;
  });

  // Build SVG — square viewBox, max 420px wide
  const NS = 'http://www.w3.org/2000/svg';
  const W = 380, H = 380, pL = 36, pR = 12, pT = 14, pB = 32;
  const cW = W - pL - pR, cH = H - pT - pB;

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  svg.style.cssText = 'width:min(100%,420px);height:auto;display:block;overflow:visible;';

  // Gradient
  const defs = document.createElementNS(NS, 'defs');
  const grad = document.createElementNS(NS, 'linearGradient');
  grad.id = 'scg'; grad.setAttribute('x1','0'); grad.setAttribute('y1','0');
  grad.setAttribute('x2','0'); grad.setAttribute('y2','1');
  [['0%','0.32'],['100%','0.02']].forEach(([off, op]) => {
    const s = document.createElementNS(NS, 'stop');
    s.setAttribute('offset', off); s.setAttribute('stop-color', '#ff8fab'); s.setAttribute('stop-opacity', op);
    grad.appendChild(s);
  });
  defs.appendChild(grad); svg.appendChild(defs);

  // Grid
  [0, 0.25, 0.5, 0.75, 1].forEach(v => {
    const y = pT + (1 - v) * cH;
    const gl = document.createElementNS(NS, 'line');
    gl.setAttribute('x1', pL); gl.setAttribute('x2', W - pR);
    gl.setAttribute('y1', y);  gl.setAttribute('y2', y);
    gl.setAttribute('stroke', 'rgba(255,255,255,0.055)'); gl.setAttribute('stroke-width','1');
    svg.appendChild(gl);
    const gt = document.createElementNS(NS, 'text');
    gt.setAttribute('x', pL - 5); gt.setAttribute('y', y + 3.5);
    gt.setAttribute('text-anchor','end'); gt.setAttribute('font-size','9');
    gt.setAttribute('fill','rgba(255,255,255,0.22)'); gt.setAttribute('font-family','inherit');
    gt.textContent = v === 0 ? '0' : `${Math.round(v*100)}%`;
    svg.appendChild(gt);
  });

  // Data points
  const pts = pcts.map((p, i) => ({
    x: pL + (i / (pcts.length - 1)) * cW,
    y: pT + (1 - p) * cH,
  }));

  // Catmull-rom → cubic bezier
  function smoothPath(ps) {
    let d = `M${ps[0].x.toFixed(1)},${ps[0].y.toFixed(1)}`;
    for (let i = 0; i < ps.length - 1; i++) {
      const p0 = ps[Math.max(0, i-1)], p1 = ps[i];
      const p2 = ps[i+1], p3 = ps[Math.min(ps.length-1, i+2)];
      const cp1x = p1.x + (p2.x - p0.x) / 6, cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6, cp2y = p2.y - (p3.y - p1.y) / 6;
      d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    }
    return d;
  }

  const linePath = smoothPath(pts);
  const bot = pT + cH;

  const area = document.createElementNS(NS, 'path');
  area.setAttribute('d', `${linePath} L${pts[pts.length-1].x},${bot} L${pts[0].x},${bot} Z`);
  area.setAttribute('fill', 'url(#scg)');
  svg.appendChild(area);

  const line = document.createElementNS(NS, 'path');
  line.setAttribute('d', linePath);
  line.setAttribute('stroke', '#ff8fab'); line.setAttribute('stroke-width', '1.8');
  line.setAttribute('fill', 'none'); line.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(line);

  // Today dot
  const tdot = document.createElementNS(NS, 'circle');
  tdot.setAttribute('cx', pts[pts.length-1].x); tdot.setAttribute('cy', pts[pts.length-1].y);
  tdot.setAttribute('r','3.5'); tdot.setAttribute('fill','#ff8fab');
  svg.appendChild(tdot);

  // X-axis labels
  [0, 5, 10, 15, 20, 25, 29].forEach(i => {
    const xt = document.createElementNS(NS, 'text');
    xt.setAttribute('x', pts[i].x); xt.setAttribute('y', H - 5);
    xt.setAttribute('text-anchor', i === 0 ? 'start' : i === 29 ? 'end' : 'middle');
    xt.setAttribute('font-size','9'); xt.setAttribute('fill','rgba(255,255,255,0.28)');
    xt.setAttribute('font-family','inherit');
    xt.textContent = dates[i].toLocaleDateString('en-US', { month:'short', day:'numeric' });
    svg.appendChild(xt);
  });

  chartSec.appendChild(svg);
  el.appendChild(chartSec);
}

function switchTrackerTab(tab) {
  ['daily','monthly','streaks'].forEach(t => {
    document.getElementById(`tr-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`tr-btn-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'streaks') buildTrackerStreaks();
}

    kw: ['urgent','asap','deadline','critical','emergency','broken','production','today',

    kw: ['meeting','call','email','respond','reply','schedule','appointment','request',
         'follow up','check in','confirm','submit','send','notify','remind','coordinate',

    kw: ['someday','maybe','nice to have','low priority','trivial','explore','consider',
         'eventually','whenever','optional','wish','watch','browse','random','idle'] },

function detectBLMatrix(text) {
  const t = text.toLowerCase();
  for (const q of EI_MATRIX) {
    if (q.kw.some(kw => t.includes(kw))) return q;
  }
  return EI_MATRIX[1]; // default: Schedule
}

function loadBacklog() {
  try { return JSON.parse(localStorage.getItem('chrono_backlog') || '[]'); }
  catch { return []; }
}
function saveBacklog(items) {
  localStorage.setItem('chrono_backlog', JSON.stringify(items));
  fsPushBacklog(items);
}

// ═══════════════════════════════════════════════════
//  BACKLOG — STATE + ACTIONS
// ═══════════════════════════════════════════════════
let blFilter  = 'all';
let blSortCol = null;
let blSortDir = 1; // 1 = asc, -1 = desc

function setBlSort(col) {
  if (blSortCol === col) blSortDir *= -1;
  else { blSortCol = col; blSortDir = 1; }
  renderBacklog();
}

function sortBlItems(items) {
  if (!blSortCol) return items;
  const today = new Date(); today.setHours(0,0,0,0);
  const EI_ORDER = EI_MATRIX.map(q => q.name);
  const ST_ORDER = ['todo','done','dropped'];

  return [...items].sort((a, b) => {
    let av, bv;
    switch (blSortCol) {
      case 'task':      av = a.text.toLowerCase();      bv = b.text.toLowerCase();      break;
      case 'category':  av = a.category;                bv = b.category;                break;
      case 'matrix':    av = EI_ORDER.indexOf(a.matrix||'Schedule'); bv = EI_ORDER.indexOf(b.matrix||'Schedule'); break;
      case 'added':     av = a.addedDate     || '';     bv = b.addedDate     || '';     break;
      case 'completed': av = a.completedDate || '￿'; bv = b.completedDate || '￿'; break;
      case 'expected':  av = a.expectedDate  || '￿'; bv = b.expectedDate  || '￿'; break;
      case 'days': {
        const da = a.expectedDate ? Math.round((new Date(a.expectedDate+'T00:00:00') - today) / 86400000) : 99999;
        const db = b.expectedDate ? Math.round((new Date(b.expectedDate+'T00:00:00') - today) / 86400000) : 99999;
        av = da; bv = db; break;
      }
      case 'status': av = ST_ORDER.indexOf(a.status); bv = ST_ORDER.indexOf(b.status); break;
      default: return 0;
    }
    if (av < bv) return -blSortDir;
    if (av > bv) return blSortDir;
    return 0;
  });
}

function addBacklogItem() {
  const input = document.getElementById('backlog-input');
  const text  = input.value.trim();
  if (!text) return;
  const cat = detectBLCategory(text);
  const mtx = detectBLMatrix(text);
  const items = loadBacklog();
  items.unshift({
    id:            Date.now().toString(),
    text,
    category:      cat.name,
    catColor:      cat.color,
    catBg:         cat.bg,
    matrix:        mtx.name,
    matrixColor:   mtx.color,
    matrixBg:      mtx.bg,
    addedDate:     new Date().toISOString().split('T')[0],
    completedDate: null,
    expectedDate:  null,
    status:        'todo',
  });
  saveBacklog(items);
  input.value = '';
  renderBacklog();
}

function blDaysInfo(expectedDate) {
  if (!expectedDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp   = new Date(expectedDate + 'T00:00:00');
  const diff  = Math.round((exp - today) / 86400000);
  if (diff === 0) return { text: 'Due today',                              cls: 'bl-days-today'  };
  if (diff  > 0)  return { text: `${diff} day${diff === 1 ? '' : 's'} left`,   cls: 'bl-days-remain' };
  const n = Math.abs(diff);
  return           { text: `${n} day${n === 1 ? '' : 's'} overdue`,        cls: 'bl-days-due'    };
}

function updateBlItem(id, changes) {
  const items = loadBacklog();
  const idx   = items.findIndex(i => i.id === id);
  if (idx === -1) return;
  Object.assign(items[idx], changes);
  saveBacklog(items);
  renderBacklog();
}

function deleteBlItem(id) {
  saveBacklog(loadBacklog().filter(i => i.id !== id));
  renderBacklog();
}

function setBlFilter(btn) {
  document.querySelectorAll('.bl-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  blFilter = btn.dataset.filter;
  renderBacklog();
}

function blFmtDate(iso) {
  if (!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ═══════════════════════════════════════════════════
//  BACKLOG — RENDER
// ═══════════════════════════════════════════════════
function renderBacklog() {
  const tbody = document.getElementById('backlog-tbody');
  tbody.innerHTML = '';

  // Update header sort indicators
  document.querySelectorAll('#backlog-table thead th[data-sort]').forEach(th => {
    const col = th.dataset.sort;
    const label = th.dataset.label || th.textContent.replace(/[ ▲▼]+$/, '').trim();
    th.dataset.label = label;
    th.classList.toggle('bl-sort-active', col === blSortCol);
    th.textContent = label + (col === blSortCol ? (blSortDir === 1 ? ' ▲' : ' ▼') : '');
  });

  let items = loadBacklog();
  if (blFilter !== 'all') items = items.filter(i => i.status === blFilter);
  items = sortBlItems(items);

  if (items.length === 0) {
    const tr = tbody.insertRow();
    const td = tr.insertCell();
    td.colSpan = 8;
    td.className = 'backlog-empty';
    td.textContent = blFilter === 'all'
      ? 'No items yet — type something above and press Enter.'
      : `No ${blFilter} items.`;
    return;
  }

  const ALL_BL_CATS = [...BL_CATS, BL_DEFAULT];

  items.forEach(item => {
    const tr = tbody.insertRow();
    tr.className = `bl-row-${item.status}`;

    // ── Task (click to edit) ──────────────────────────
    const tdTask = tr.insertCell();
    const makeTaskSpan = () => {
      const span = document.createElement('span');
      span.className   = 'bl-task-text';
      span.textContent = item.text;
      span.title       = 'Click to edit';
      span.style.cursor = 'text';
      span.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type      = 'text';
        inp.value     = item.text;
        inp.className = 'bl-inline-edit';
        tdTask.replaceChild(inp, span);
        inp.focus();
        inp.select();
        const save = () => {
          const val = inp.value.trim();
          if (val && val !== item.text) {
            const cat = detectBLCategory(val);
            updateBlItem(item.id, { text: val, category: cat.name, catColor: cat.color, catBg: cat.bg });
          } else renderBacklog();
        };
        inp.addEventListener('blur', save);
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter')  inp.blur();
          if (e.key === 'Escape') renderBacklog();
        });
      });
      return span;
    };
    tdTask.appendChild(makeTaskSpan());

    // ── Category (click to cycle) ─────────────────────
    const tdCat = tr.insertCell();
    const badge = document.createElement('span');
    badge.className = 'bl-cat-badge';
    badge.textContent = item.category;
    badge.style.cssText = `color:${item.catColor};background:${item.catBg};`;
    badge.title = 'Click to change';
    badge.addEventListener('click', () => {
      const idx  = ALL_BL_CATS.findIndex(c => c.name === item.category);
      const next = ALL_BL_CATS[(idx + 1) % ALL_BL_CATS.length];
      updateBlItem(item.id, { category: next.name, catColor: next.color, catBg: next.bg });
    });
    tdCat.appendChild(badge);

    // ── Priority / Eisenhower (click to cycle) ────────
    const tdMtx  = tr.insertCell();
    const mtxVal = item.matrix || EI_MATRIX[1].name;
    const mtxDef = EI_MATRIX.find(q => q.name === mtxVal) || EI_MATRIX[1];
    const mbadge = document.createElement('span');
    mbadge.className = 'bl-cat-badge';
    mbadge.textContent = mtxVal;
    mbadge.style.cssText = `color:${mtxDef.color};background:${mtxDef.bg};`;
    mbadge.title = 'Click to change — Eisenhower Matrix';
    mbadge.addEventListener('click', () => {
      const idx  = EI_MATRIX.findIndex(q => q.name === (item.matrix || EI_MATRIX[1].name));
      const next = EI_MATRIX[(idx + 1) % EI_MATRIX.length];
      updateBlItem(item.id, { matrix: next.name, matrixColor: next.color, matrixBg: next.bg });
    });
    tdMtx.appendChild(mbadge);

    // ── Added date ────────────────────────────────────
    const tdAdded = tr.insertCell();
    tdAdded.className   = 'bl-date';
    tdAdded.textContent = blFmtDate(item.addedDate) || '—';

    // ── Completed date ────────────────────────────────
    const tdComp = tr.insertCell();
    tdComp.className   = item.completedDate ? 'bl-date' : 'bl-date-none';
    tdComp.textContent = item.completedDate ? blFmtDate(item.completedDate) : '—';

    // ── Expected date (click to edit) ─────────────────
    const tdExp = tr.insertCell();
    const renderExpDate = () => {
      tdExp.innerHTML = '';
      const s = document.createElement('span');
      s.className   = item.expectedDate ? 'bl-date editable' : 'bl-date-none';
      s.textContent = item.expectedDate ? blFmtDate(item.expectedDate) : 'Set date';
      s.title       = 'Click to edit';
      s.addEventListener('click', () => {
        tdExp.innerHTML = '';
        const inp = document.createElement('input');
        inp.type      = 'date';
        inp.value     = item.expectedDate || '';
        inp.className = 'bl-inline-edit bl-date-input';
        tdExp.appendChild(inp);
        inp.focus();
        inp.showPicker?.();
        inp.addEventListener('change', () => {
          updateBlItem(item.id, { expectedDate: inp.value || null });
        });
        inp.addEventListener('blur', () => renderBacklog());
      });
      tdExp.appendChild(s);
    };
    renderExpDate();

    // ── Days remaining / overdue ──────────────────────
    const tdDays = tr.insertCell();
    const di = blDaysInfo(item.expectedDate);
    if (di) {
      tdDays.className   = di.cls;
      tdDays.textContent = di.text;
    } else {
      tdDays.className   = 'bl-days-none';
      tdDays.textContent = '—';
    }

    // ── Status + actions ──────────────────────────────
    const tdSt = tr.insertCell();
    tdSt.className = 'bl-status-cell';

    const sbadge = document.createElement('span');
    sbadge.className   = `bl-status-badge bl-st-${item.status}`;
    sbadge.textContent = item.status === 'todo' ? 'Todo'
                       : item.status === 'done' ? '✓ Done'
                       :                          '✕ Dropped';
    tdSt.appendChild(sbadge);

    const acts = document.createElement('span');
    acts.className = 'bl-actions';

    if (item.status === 'todo') {
      const doneBtn = document.createElement('button');
      doneBtn.className   = 'bl-btn done';
      doneBtn.title       = 'Mark as done';
      doneBtn.textContent = '✓';
      doneBtn.onclick     = () => updateBlItem(item.id, {
        status: 'done', completedDate: new Date().toISOString().split('T')[0],
      });
      const dropBtn = document.createElement('button');
      dropBtn.className   = 'bl-btn drop';
      dropBtn.title       = 'Drop — no longer needed';
      dropBtn.textContent = '✕';
      dropBtn.onclick     = () => updateBlItem(item.id, { status: 'dropped' });
      acts.append(doneBtn, dropBtn);
    } else {
      const undoBtn = document.createElement('button');
      undoBtn.className   = 'bl-btn undo';
      undoBtn.title       = 'Restore to todo';
      undoBtn.textContent = '↩';
      undoBtn.onclick     = () => updateBlItem(item.id, { status: 'todo', completedDate: null });
      acts.appendChild(undoBtn);
    }

    const delBtn = document.createElement('button');
    delBtn.className   = 'bl-btn del';
    delBtn.title       = 'Delete permanently';
    delBtn.textContent = '⌫';
    delBtn.onclick     = () => deleteBlItem(item.id);
    acts.appendChild(delBtn);

    tdSt.appendChild(acts);
    tbody.appendChild(tr);
  });
}

function loadGoals() {
  const raw = localStorage.getItem('chrono_goals_v3');
  if (raw) {
    try {
      const goals = JSON.parse(raw);
      goals.forEach(g => { if (!g.checks) g.checks = {}; });
      return goals;
    } catch {}
  }
  const goals = JSON.parse(JSON.stringify(DEFAULT_GOALS));
  saveGoals(goals);
  return goals;
}
function saveGoals(goals) {
  localStorage.setItem('chrono_goals_v3', JSON.stringify(goals));
  fsPushGoals(goals);
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function getCheckDates() {
  const dates = [];
  const today = new Date();
  for (let i = 30; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates; // dates[0]=30 days ago, dates[30]=today
}

function isLevelUnlocked(goal, levelIndex) {
  if (levelIndex === 0) return true;
  return goal.levels[levelIndex - 1].passedDate !== null;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ═══════════════════════════════════════════════════
//  GOALS — RENDER
// ═══════════════════════════════════════════════════
function renderGoals() {
  const list = document.getElementById('goals-list');
  list.innerHTML = '';
  loadGoals().forEach(g => list.appendChild(buildGoalSection(g)));
}

function buildGoalSection(goal) {
  const section = document.createElement('div');
  section.className = 'goal-section';

  const head = document.createElement('div');
  head.className = 'goal-section-head';

  const iconEl = document.createElement('span');
  iconEl.className = 'goal-section-icon';
  iconEl.textContent = goal.icon || '🎯';

  const titleEl = document.createElement('span');
  titleEl.className = 'goal-section-title';
  titleEl.textContent = goal.title;

  const delBtn = document.createElement('button');
  delBtn.className = 'goal-section-del';
  delBtn.title = 'Delete goal';
  delBtn.textContent = '⌫';
  delBtn.onclick = () => {
    if (!confirm(`Delete "${goal.title}"?`)) return;
    saveGoals(loadGoals().filter(g => g.id !== goal.id));
    renderGoals();
  };

  head.append(iconEl, titleEl, delBtn);

  const levelsWrap = document.createElement('div');
  levelsWrap.className = 'goal-levels';

  goal.levels.forEach((level, idx) => {
    const unlocked = isLevelUnlocked(goal, idx);
    const passed   = level.passedDate !== null;
    levelsWrap.appendChild(buildLevelCard(goal, level, unlocked, passed));
  });

  section.append(head, levelsWrap);
  return section;
}

function buildLevelCard(goal, level, unlocked, passed) {
  const card = document.createElement('div');

  if (!unlocked) {
    card.className = 'level-card locked';
    const row = document.createElement('div');
    row.className = 'level-locked-row';
    const lockIcon = document.createElement('span');
    lockIcon.className = 'level-lock-icon';
    lockIcon.textContent = '🔒';
    const titleEl = document.createElement('span');
    titleEl.className = 'level-locked-title';
    titleEl.textContent = `Level ${level.num} — ${level.title}`;
    const countEl = document.createElement('span');
    countEl.className = 'level-locked-count';
    const newCount = level.habits.filter(h => !h.carriedOver).length;
    countEl.textContent = `${newCount} new habit${newCount !== 1 ? 's' : ''}`;
    row.append(lockIcon, titleEl, countEl);
    card.appendChild(row);
    return card;
  }

  if (passed) {
    card.className = 'level-card passed-collapsed';
    const passedRow = document.createElement('div');
    passedRow.className = 'level-passed-row';
    passedRow.onclick = () => card.classList.toggle('open');

    const check = document.createElement('div');
    check.className = 'level-passed-check';
    check.textContent = '✓';

    const titleEl = document.createElement('span');
    titleEl.className = 'level-passed-title';
    titleEl.textContent = `Level ${level.num} — ${level.title}`;

    const dateEl = document.createElement('span');
    dateEl.className = 'level-passed-date';
    const pd = new Date(level.passedDate + 'T00:00:00');
    dateEl.textContent = `passed ${pd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

    const chevron = document.createElement('span');
    chevron.className = 'level-passed-chevron';
    chevron.textContent = '▶';

    passedRow.append(check, titleEl, dateEl, chevron);

    const body = document.createElement('div');
    body.className = 'level-passed-body';
    appendHabitRows(body, goal, level, true);

    card.append(passedRow, body);
    return card;
  }

  // Active level
  card.className = 'level-card active';

  const head = document.createElement('div');
  head.className = 'level-active-head';

  const badge = document.createElement('span');
  badge.className = 'level-num-badge';
  badge.textContent = `Level ${level.num}`;
  badge.style.cssText = `color:${goal.color};background:${hexToRgba(goal.color, 0.12)};`;

  const titleEl = document.createElement('span');
  titleEl.className = 'level-active-title';
  titleEl.textContent = level.title;

  head.append(badge, titleEl);
  card.appendChild(head);

  appendHabitRows(card, goal, level, false);

  const footer = document.createElement('div');
  footer.className = 'level-footer';
  const passBtn = document.createElement('button');
  passBtn.className = 'level-pass-btn';
  passBtn.textContent = 'Mark as Passed';
  passBtn.onclick = () => showPassModal(goal.id, level.id, level.num, level.title, goal.levels);
  footer.appendChild(passBtn);
  card.appendChild(footer);

  return card;
}

function appendHabitRows(container, goal, level, isFrozen) {
  const carried = level.habits.filter(h => h.carriedOver);
  const fresh   = level.habits.filter(h => !h.carriedOver);

  if (carried.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'habit-section-label carried';
    lbl.textContent = 'Carried Over';
    container.appendChild(lbl);
    carried.forEach(h => container.appendChild(buildHabitRow(goal, h, isFrozen, true)));
  }

  if (fresh.length > 0) {
    if (carried.length > 0) {
      const lbl = document.createElement('div');
      lbl.className = 'habit-section-label';
      lbl.textContent = 'New This Level';
      container.appendChild(lbl);
    }
    fresh.forEach(h => container.appendChild(buildHabitRow(goal, h, isFrozen, false)));
  }
}

function buildHabitRow(goal, habit, isFrozen, isCarried) {
  const row = document.createElement('div');
  row.className = 'habit-row' + (isCarried ? ' carried' : '');

  const label = document.createElement('span');
  label.className = 'habit-label';
  label.textContent = habit.label;

  row.append(label, buildCheckStrip(goal, habit.id, isFrozen));
  return row;
}

function buildCheckStrip(goal, habitId, isFrozen) {
  const strip   = document.createElement('div');
  strip.className = 'check-strip';

  const dates   = getCheckDates();
  const checks  = goal.checks[habitId] || {};
  const today   = todayStr();

  dates.forEach(dateStr => {
    const box = document.createElement('div');
    box.className = 'check-box';
    if (dateStr === today) box.classList.add('today');
    if (checks[dateStr]) {
      box.classList.add('checked');
      box.style.background = goal.color;
    }
    const d = new Date(dateStr + 'T00:00:00');
    box.title = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    if (!isFrozen) {
      box.addEventListener('click', () => {
        const goals = loadGoals();
        const g = goals.find(g => g.id === goal.id);
        if (!g) return;
        if (!g.checks[habitId]) g.checks[habitId] = {};
        if (g.checks[habitId][dateStr]) {
          delete g.checks[habitId][dateStr];
          box.classList.remove('checked');
          box.style.background = '';
        } else {
          g.checks[habitId][dateStr] = true;
          box.classList.add('checked');
          box.style.background = g.color;
        }
        saveGoals(goals);
      });
    }

    strip.appendChild(box);
  });

  return strip;
}

// ═══════════════════════════════════════════════════
//  GOALS — PASS MODAL
// ═══════════════════════════════════════════════════
function showPassModal(goalId, levelId, levelNum, levelTitle, allLevels) {
  const nextLevel = allLevels[allLevels.findIndex(l => l.id === levelId) + 1] || null;
  document.getElementById('pass-modal-title').textContent =
    `Mark Level ${levelNum} as passed?`;
  document.getElementById('pass-modal-body').textContent = nextLevel
    ? `"${levelTitle}" habits carry into Level ${nextLevel.num}. Your streak continues.`
    : `You've completed the final level of this goal!`;
  document.getElementById('pass-modal-confirm-btn').onclick = () => {
    doPassLevel(goalId, levelId);
    hidePassModal();
  };
  document.getElementById('pass-modal-backdrop').classList.add('open');
}

function hidePassModal() {
  document.getElementById('pass-modal-backdrop').classList.remove('open');
}

function doPassLevel(goalId, levelId) {
  const goals = loadGoals();
  const g = goals.find(g => g.id === goalId);
  if (!g) return;
  const level = g.levels.find(l => l.id === levelId);
  if (level) { level.passedDate = todayStr(); saveGoals(goals); renderGoals(); }
}

// ═══════════════════════════════════════════════════
//  GOALS — NEW GOAL MODAL
// ═══════════════════════════════════════════════════
function showGoalModal() {
  document.getElementById('gm-title').value = '';
  document.getElementById('gm-icon').value  = '';
  document.getElementById('goal-modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('gm-title').focus(), 50);
}
function hideGoalModal() {
  document.getElementById('goal-modal-backdrop').classList.remove('open');
}
function submitGoal() {
  const title = document.getElementById('gm-title').value.trim();
  const icon  = document.getElementById('gm-icon').value.trim() || '🎯';
  if (!title) return;
  const goals = loadGoals();
  goals.push({
    id: `goal_${Date.now()}`, title, icon, color: '#a06bff', checks: {},
    levels: [{ id: `lvl1_${Date.now()}`, num: 1, title: 'Level 1', passedDate: null, habits: [] }],
  });
  saveGoals(goals);
  hideGoalModal();
  renderGoals();
}

function flLoadLogs() { try { return JSON.parse(localStorage.getItem('fl_logs')||'{}'); } catch { return {}; } }
function flSaveLogs(d) { localStorage.setItem('fl_logs', JSON.stringify(d)); }
function flLoadPRs()  { try { return JSON.parse(localStorage.getItem('fl_prs') ||'{}'); } catch { return {}; } }
function flSavePRs(d) { localStorage.setItem('fl_prs',  JSON.stringify(d)); }

//  FREELETICS — PR LOGIC
// ═══════════════════════════════════════════════════
function flTimeToSecs(str) {
  const p = String(str).trim().split(':');
  return p.length === 2 ? parseInt(p[0])*60 + parseInt(p[1]) : parseInt(p[0])||0;
}

function flIsBetter(name, newVal, newStar, oldEntry) {
  if (!oldEntry) return true;
  if (newStar && !oldEntry.star) return true;
  if (!newStar && oldEntry.star) return false;
  return FL_MAXES.includes(name)
    ? parseInt(newVal) > parseInt(oldEntry.value)
    : flTimeToSecs(newVal) < flTimeToSecs(oldEntry.value);
}

function flUpdatePRs(results) {
  const prs = flLoadPRs();
  const newPRs = [];
  const best = {};
  results.forEach(r => {
    if (!r.value) return;
    if (!best[r.name] || flIsBetter(r.name, r.value, r.star, best[r.name]))
      best[r.name] = r;
  });
  Object.values(best).forEach(r => {
    if (flIsBetter(r.name, r.value, r.star, prs[r.name])) {
      prs[r.name] = { value: r.value, star: !!r.star, date: new Date().toISOString().split('T')[0] };
      newPRs.push(r.name);
    }
  });
  flSavePRs(prs);
  return newPRs;
}

function flLoadLevel()      { return Math.max(1, Math.min(10, parseInt(localStorage.getItem('fl_level') || '1'))); }
function flSaveLevel(n)     { localStorage.setItem('fl_level', String(n)); }
function flLoadRound()      { return parseInt(localStorage.getItem('fl_round') || '1'); }
function flSaveRound(n)     { localStorage.setItem('fl_round', String(n)); }
function flLoadRoundStart() { return localStorage.getItem('fl_round_start') || '2000-01-01'; }
function flSaveRoundStart(d){ localStorage.setItem('fl_round_start', d); }

function flIsSessionTouched(sessionId) {
  const log = flLoadLogs()[sessionId];
  return !!(log?.date && log.date >= flLoadRoundStart() && log.results?.length);
}

function flScaleReps(reps, level) {
  return Math.max(1, Math.round(reps * level / 10));
}

function renderFLLevelUI() {
  const el = document.getElementById('fl-level-control');
  if (!el) return;
  el.innerHTML = '';

  const level = flLoadLevel();
  const round = flLoadRound();
  const pct   = level * 10;

  const card = document.createElement('div'); card.className = 'fl-level-card';

  // Round label
  const roundLbl = document.createElement('div'); roundLbl.className = 'fl-level-round-lbl';
  roundLbl.textContent = 'Round ' + round;
  card.appendChild(roundLbl);

  // Level row
  const row = document.createElement('div'); row.className = 'fl-level-row';
  const lbl = document.createElement('span'); lbl.className = 'fl-level-lbl'; lbl.textContent = 'Level';
  const decBtn = document.createElement('button'); decBtn.className = 'fl-level-btn'; decBtn.textContent = '−';
  decBtn.disabled = level <= 1; decBtn.onclick = () => flAdjustLevel(-1);
  const num = document.createElement('span'); num.className = 'fl-level-num'; num.textContent = level;
  const incBtn = document.createElement('button'); incBtn.className = 'fl-level-btn'; incBtn.textContent = '+';
  incBtn.disabled = level >= 10; incBtn.onclick = () => flAdjustLevel(1);
  const pctEl = document.createElement('span'); pctEl.className = 'fl-level-pct'; pctEl.textContent = pct + '%';
  row.append(lbl, decBtn, num, incBtn, pctEl);
  card.appendChild(row);

  // Pip bar
  const pips = document.createElement('div'); pips.className = 'fl-level-pips';
  for (let i = 1; i <= 10; i++) {
    const pip = document.createElement('div');
    pip.className = 'fl-level-pip' + (i <= level ? ' on' : '');
    pips.appendChild(pip);
  }
  card.appendChild(pips);

  // Description
  const desc = document.createElement('div'); desc.className = 'fl-level-desc';
  desc.textContent = pct + '% of prescribed reps shown as target in each workout.';
  card.appendChild(desc);

  // New round button
  const newRoundBtn = document.createElement('button'); newRoundBtn.className = 'fl-new-round-btn';
  newRoundBtn.textContent = 'Start Round ' + (round + 1);
  newRoundBtn.onclick = flStartNewRound;
  card.appendChild(newRoundBtn);

  el.appendChild(card);
}

function flAdjustLevel(delta) {
  const next = Math.max(1, Math.min(10, flLoadLevel() + delta));
  flSaveLevel(next);
  renderFLLevelUI();
  renderFLProgram();
}

function flStartNewRound() {
  const next = flLoadRound() + 1;
  if (!confirm('Start Round ' + next + '?\n\nAll sessions will be treated as untouched and the current level will apply to them.')) return;
  flSaveRound(next);
  flSaveRoundStart(new Date().toISOString().split('T')[0]);
  renderFLLevelUI();
  renderFLProgram();
}

  ['workouts','exercises'].forEach(t => {
    document.getElementById('fl-htab-' + t).classList.toggle('active', t === tab);
  });
  flRenderHistList(tab);
  document.getElementById('fl-hist-detail-pane').innerHTML =
    '<div class="fl-hist-placeholder">Select an item to view its history.</div>';
}

function flGetAllExercises() {
  const seen = new Set(), names = [];
  Object.values(FL_WORKOUT_EXERCISES).forEach(def => {
    if (def.logType === 'max') return;
    def.rounds.forEach(r => r.sets.forEach(s => { if (!seen.has(s.ex)) { seen.add(s.ex); names.push(s.ex); } }));
  });
  return names.sort();
}

function flGetExerciseHistoryGlobal(exName) {
  const logs = flLoadLogs();
  const entries = [];
  Object.values(logs).forEach(log => {
    if (!log.exercises || !log.date) return;
    Object.entries(log.exercises).forEach(([wName, exArr]) => {
      const def = FL_WORKOUT_EXERCISES[wName]; if (!def) return;
      let secs = 0;
      exArr.forEach(e => {
        if (!e.time) return;
        const set = def.rounds[e.ri]?.sets[e.si];
        if (set?.ex !== exName) return;
        secs += flParseMMSS(e.time);
      });
      if (secs > 0) entries.push({ date: log.date, workout: wName, value: flSecsToMMSS(secs), star: false, isMax: false, level: log.level || null });
    });
  });
  return entries.sort((a, b) => a.date.localeCompare(b.date) || a.workout.localeCompare(b.workout));
}

  const pane = document.getElementById('fl-hist-list-pane');

  const searchWrap = document.createElement('div'); searchWrap.className = 'fl-hist-search-wrap';
  const inp = document.createElement('input');

  inp.placeholder = tab === 'workouts' ? 'Search workouts…' : 'Search exercises…';

  const listEl = document.createElement('div');

          item.classList.add('active');

        listEl.appendChild(item);

  render('');
  inp.oninput = () => render(inp.value);
}

function flDrawLineGraph(entries, container, isMax) {
  container.innerHTML = '';
  if (!entries.length) {
    container.innerHTML = '<div class="fl-graph-empty">No data yet.</div>'; return;
  }

  const W  = Math.max(container.getBoundingClientRect().width - 20, 300);
  const H  = 200, mt = 22, mr = 20, mb = 46, ml = 58;
  const cW = W - ml - mr, cH = H - mt - mb;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const vals = entries.map(e => isMax ? (parseInt(e.value) || 0) : flParseMMSS(e.value));

  // Normalized: estimated equivalent full-workout time (time × 10 / level)
  const normVals = isMax ? null : entries.map(e =>
    (e.level && e.level < 10) ? Math.round(flParseMMSS(e.value) * 10 / e.level) : null
  );
  const hasNorm = normVals && normVals.some(v => v !== null);

  // Y range includes normalized values if present so both lines fit
  const allVals = hasNorm ? [...vals, ...normVals.filter(v => v !== null)] : vals;
  const minV = Math.min(...allVals), maxV = Math.max(...allVals), range = maxV - minV || 1;

  // Best performance at TOP. For time: lower=better → small val → top. For max: higher=better → large val → top.
  const yOf = v => isMax ? mt + (1 - (v - minV) / range) * cH : mt + (v - minV) / range * cH;
  const xOf = i => entries.length > 1 ? ml + (i / (entries.length - 1)) * cW : ml + cW / 2;

  // Grid + Y-axis labels
  for (let i = 0; i <= 4; i++) {
    const y = mt + (i / 4) * cH;
    const gl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    gl.setAttribute('x1', ml); gl.setAttribute('x2', ml + cW);
    gl.setAttribute('y1', y);  gl.setAttribute('y2', y);
    gl.setAttribute('stroke', 'rgba(255,255,255,0.06)'); svg.appendChild(gl);

    const lv  = isMax ? maxV - (i / 4) * range : minV + (i / 4) * range;
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', ml - 6); txt.setAttribute('y', y + 4);
    txt.setAttribute('text-anchor', 'end'); txt.setAttribute('font-size', '10');
    txt.setAttribute('fill', 'rgba(255,255,255,0.28)'); txt.setAttribute('font-family', 'monospace');
    txt.textContent = isMax ? Math.round(lv) : flSecsToMMSS(Math.round(lv));
    svg.appendChild(txt);
  }

  // Dashed normalized line (drawn in segments to skip entries with no level data)
  if (hasNorm) {
    let curSeg = [];
    const segments = [];
    normVals.forEach((v, i) => {
      if (v !== null) {
        curSeg.push(`${xOf(i)},${yOf(v)}`);
      } else if (curSeg.length) {
        segments.push([...curSeg]); curSeg = [];
      }
    });
    if (curSeg.length) segments.push(curSeg);
    segments.forEach(pts => {
      if (pts.length < 2) return;
      const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      pl.setAttribute('points', pts.join(' ')); pl.setAttribute('fill', 'none');
      pl.setAttribute('stroke', 'rgba(255,200,77,0.55)'); pl.setAttribute('stroke-width', '1.8');
      pl.setAttribute('stroke-dasharray', '5,4');
      pl.setAttribute('stroke-linecap', 'round'); pl.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(pl);
    });
  }

  // Solid actual line
  if (entries.length > 1) {
    const pts = entries.map((_, i) => `${xOf(i)},${yOf(vals[i])}`).join(' ');
    const pl  = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    pl.setAttribute('points', pts); pl.setAttribute('fill', 'none');
    pl.setAttribute('stroke', '#ff8050'); pl.setAttribute('stroke-width', '2.5');
    pl.setAttribute('stroke-linecap', 'round'); pl.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(pl);
  }

  // Points + level badges + X labels
  const step = Math.max(1, Math.ceil(entries.length / 7));
  entries.forEach((e, i) => {
    const x = xOf(i), y = yOf(vals[i]);

    // Level badge above (or below if near chart top)
    if (!isMax && e.level) {
      const badgeY = y - 10 < mt + 4 ? y + 18 : y - 10;
      const lvlTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lvlTxt.setAttribute('x', x); lvlTxt.setAttribute('y', badgeY);
      lvlTxt.setAttribute('text-anchor', 'middle'); lvlTxt.setAttribute('font-size', '9');
      lvlTxt.setAttribute('fill', 'rgba(255,200,77,0.75)');
      lvlTxt.textContent = 'L' + e.level;
      svg.appendChild(lvlTxt);
    }

    const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circ.setAttribute('cx', x); circ.setAttribute('cy', y); circ.setAttribute('r', '5');
    circ.setAttribute('fill', e.star ? '#ffc84d' : '#ff8050');
    circ.setAttribute('stroke', '#161616'); circ.setAttribute('stroke-width', '2');
    svg.appendChild(circ);

    if (i % step === 0 || i === entries.length - 1) {
      const d   = new Date(e.date + 'T00:00:00');
      const lbl = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
      const t   = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', x); t.setAttribute('y', H - mb + (e.workout ? 13 : 16));
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '10');
      t.setAttribute('fill', 'rgba(255,255,255,0.28)'); t.textContent = lbl;
      svg.appendChild(t);
      if (e.workout) {
        const wt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        wt.setAttribute('x', x); wt.setAttribute('y', H - mb + 26);
        wt.setAttribute('text-anchor', 'middle'); wt.setAttribute('font-size', '9');
        wt.setAttribute('fill', 'rgba(255,107,53,0.5)');
        wt.textContent = e.workout.length > 8 ? e.workout.slice(0, 7) + '…' : e.workout;
        svg.appendChild(wt);
      }
    }
  });

  container.appendChild(svg);

  const hint = document.createElement('div'); hint.className = 'fl-graph-label';
  if (hasNorm) {
    hint.innerHTML = '<span style="color:#ff8050;font-weight:700">—</span> actual &nbsp;&nbsp;<span style="color:rgba(255,200,77,0.65)">- - -</span> est. full workout &nbsp;&nbsp; ↑ faster = higher';
  } else {
    hint.textContent = isMax ? '↑ higher reps = better' : '↑ faster = higher on chart';
  }
  container.appendChild(hint);
}

function flShowHistDetail(name, isExercise) {
  const pane = document.getElementById('fl-hist-detail-pane');
  pane.innerHTML = '';

  const history = isExercise ? flGetExerciseHistoryGlobal(name) : flGetWorkoutHistory(name);
  const def     = !isExercise ? FL_WORKOUT_EXERCISES[name] : null;
  const isMax   = def?.logType === 'max';

  // Header
  const hdr = document.createElement('div'); hdr.className = 'fl-hist-detail-header';
  const ttl = document.createElement('div'); ttl.className = 'fl-hist-detail-title'; ttl.textContent = name;
  hdr.appendChild(ttl);
  const meta = document.createElement('div'); meta.className = 'fl-hist-detail-meta';
  if (def) {
    meta.textContent = (isMax ? 'MAX' : 'Workout') + '  ·  ' + def.equipment + (isMax ? '  ·  ' + def.duration : '');
  } else {
    const inW = Object.entries(FL_WORKOUT_EXERCISES)
      .filter(([,d]) => d.rounds.some(r => r.sets.some(s => s.ex === name)))
      .map(([n]) => n);
    meta.textContent = 'Exercise  ·  Appears in: ' + inW.join(', ');
  }
  hdr.appendChild(meta); pane.appendChild(hdr);

  if (!history.length) {
    pane.innerHTML += '<div class="fl-hist-empty" style="padding:40px 0;text-align:center;color:var(--txt-dim);font-size:13px;font-style:italic">No sessions logged yet.</div>';
    return;
  }

  // Graph
  const graphWrap = document.createElement('div'); graphWrap.className = 'fl-hist-graph-wrap';
  pane.appendChild(graphWrap);
  requestAnimationFrame(() => flDrawLineGraph(history, graphWrap, isMax));

  // Session table
  const secTitle = document.createElement('div');
  secTitle.className = 'fl-hist-section-title';
  secTitle.style.cssText = 'margin-top:20px;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt-dim);';
  secTitle.textContent = 'All sessions  (' + history.length + ')';
  pane.appendChild(secTitle);

  const table = document.createElement('div'); table.className = 'fl-hist-table';
  [...history].reverse().forEach((entry, revI) => {
    const origI = history.length - 1 - revI;
    // For exercise history: compare against previous session of the same workout.
    // For workout history: compare sequentially (all entries are the same workout).
    const prev = entry.workout
      ? history.slice(0, origI).reverse().find(e => e.workout === entry.workout)
      : history[origI - 1];

    const row = document.createElement('div'); row.className = 'fl-hist-table-row';
    const d   = document.createElement('span'); d.className = 'fl-hist-date'; d.textContent = flFmtDate(entry.date);

    const wk = document.createElement('span'); wk.className = 'fl-hist-workout';
    wk.textContent = entry.workout || '';

    const v = document.createElement('span'); v.className = 'fl-hist-val';
    v.textContent = isMax ? entry.value + ' reps' : entry.value;
    if (entry.star) { const s = document.createElement('span'); s.style.cssText='color:#ffc84d;margin-left:5px;'; s.textContent='★'; v.appendChild(s); }

    const lvl = document.createElement('span'); lvl.className = 'fl-hist-level';
    lvl.textContent = entry.level ? 'L' + entry.level : '';

    const norm = document.createElement('span'); norm.className = 'fl-hist-norm';
    if (!isMax && entry.level && entry.level < 10) {
      norm.textContent = '~' + flSecsToMMSS(Math.round(flParseMMSS(entry.value) * 10 / entry.level));
    }

    const tr = document.createElement('span'); tr.className = 'fl-hist-trend';
    if (!prev) { tr.textContent = 'first run'; tr.classList.add('same'); }
    else if (isMax) {
      const df = parseInt(entry.value) - parseInt(prev.value);
      if      (df > 0) { tr.textContent = '↑ +' + df + ' reps'; tr.classList.add('better'); }
      else if (df < 0) { tr.textContent = '↓ ' + df + ' reps'; tr.classList.add('worse'); }
      else             { tr.textContent = '→ same';              tr.classList.add('same'); }
    } else {
      const df = flParseMMSS(prev.value) - flParseMMSS(entry.value);
      if      (df > 0) { tr.textContent = '↑ ' + flSecsToMMSS(df)  + ' faster'; tr.classList.add('better'); }
      else if (df < 0) { tr.textContent = '↓ ' + flSecsToMMSS(-df) + ' slower'; tr.classList.add('worse'); }
      else             { tr.textContent = '→ same';                               tr.classList.add('same'); }
    }
    row.append(d, wk, v, lvl, norm, tr); table.appendChild(row);
  });
  pane.appendChild(table);
}

// ═══════════════════════════════════════════════════
//  FREELETICS — RENDER PROGRAM
// ═══════════════════════════════════════════════════
const flOpenWeeks = new Set();

function flCurrentWeek() {
  const logs = flLoadLogs();
  for (const w of FL_WEEKS) {
    if (w.sessions.some(s => !logs[s.id])) return w.week;
  }
  return FL_WEEKS[FL_WEEKS.length-1].week;
}

function renderFLProgram() {
  const container = document.getElementById('fl-program');
  const logs = flLoadLogs();
  const curWeek = flCurrentWeek();
  container.innerHTML = '';

  FL_WEEKS.forEach(w => {
    const done  = w.sessions.filter(s => logs[s.id]).length;
    const total = w.sessions.length;
    const pct   = total ? (done/total)*100 : 0;
    const isCur = w.week === curWeek;
    const isOpen = flOpenWeeks.has(w.week) || (isCur && !flOpenWeeks.has(-w.week));

    const weekEl = document.createElement('div');
    weekEl.className = 'fl-week' + (w.hell?' fl-hell':'') + (isCur?' fl-current':'') + (isOpen?' open':'');
    weekEl.dataset.week = w.week;

    // ── Head ──────────────────────────────
    const head = document.createElement('div');
    head.className = 'fl-week-head';
    head.onclick = () => {
      const open = weekEl.classList.toggle('open');
      open ? flOpenWeeks.add(w.week)    : flOpenWeeks.delete(w.week);
      open ? flOpenWeeks.delete(-w.week): flOpenWeeks.add(-w.week);
    };

    const chev = document.createElement('span');
    chev.className = 'fl-week-chevron'; chev.textContent = '▶';

    const lbl = document.createElement('span');
    lbl.className = 'fl-week-label';
    lbl.textContent = w.label + (isCur ? ' ← current' : '');

    const progWrap = document.createElement('div');
    progWrap.className = 'fl-week-prog-wrap';
    const bar = document.createElement('div'); bar.className = 'fl-week-prog-bar';
    const fill = document.createElement('div'); fill.className = 'fl-week-prog-fill';
    fill.style.width = pct + '%';
    if (pct === 100) fill.style.background = '#4ddd8e';
    bar.appendChild(fill);
    const pt = document.createElement('span'); pt.className = 'fl-week-prog-text';
    pt.textContent = done+'/'+total;
    progWrap.append(bar, pt);
    head.append(chev, lbl, progWrap);

    // ── Body ──────────────────────────────
    const body = document.createElement('div');
    body.className = 'fl-week-body';

    if (w.challenge) {
      const ch = document.createElement('div');
      ch.className = 'fl-challenge';
      ch.innerHTML = '<span style="font-size:13px">⚡</span><strong>Challenge:</strong> ' + w.challenge;
      body.appendChild(ch);
    }

    w.sessions.forEach(s => {
      const log    = logs[s.id];
      const isDone = flSessionDone(s, log);

      const sessEl = document.createElement('div');
      sessEl.className = 'fl-session' + (isDone ? ' done' : '');
      sessEl.id = 'fl-sess-' + s.id;

      const row = document.createElement('div');
      row.className = 'fl-session-row';

      const slbl = document.createElement('span');
      slbl.className = 'fl-session-label'; slbl.textContent = s.label;

      // Blocks
      const blocksDiv = document.createElement('div');
      blocksDiv.className = 'fl-blocks';
      s.blocks.forEach((b, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'fl-block-sep';
          sep.textContent = b.breakBefore ? b.breakBefore+'m' : '+';
          blocksDiv.appendChild(sep);
        }
        const badge = document.createElement('span');
        badge.className = 'fl-block-badge ' + b.type;
        badge.textContent = b.name;
        badge.title = 'Click to view exercises & log';
        badge.style.cursor = 'pointer';
        badge.onclick = e => { e.stopPropagation(); flOpenWorkoutModal(b.name, s.id); };
        blocksDiv.appendChild(badge);
      });

      // Status
      const statusDiv = document.createElement('div');
      statusDiv.className = 'fl-session-status';

      if (isDone) {
        const db = document.createElement('span');
        db.className = 'fl-done-badge';
        const uniqueNames = [...new Set(s.blocks.map(b => b.name))];
        const parts = uniqueNames.map(n => {
          const r = log.results?.find(r => r.name === n);
          if (!r?.value) return null;
          return r.value + (r.star ? ' ★' : '');
        }).filter(Boolean);
        db.textContent = '✓  ' + (parts.length ? parts.join(' · ') : 'Done');
        statusDiv.appendChild(db);
        const eb = document.createElement('button');
        eb.className = 'fl-edit-btn'; eb.textContent = 'Edit';
        eb.onclick = e => { e.stopPropagation(); flOpenLogForm(s, w.week); };
        statusDiv.appendChild(eb);
      } else {
        const lb = document.createElement('button');
        lb.className = 'fl-log-btn'; lb.textContent = 'Log';
        lb.onclick = e => { e.stopPropagation(); flOpenLogForm(s, w.week); };
        statusDiv.appendChild(lb);
      }

      row.append(slbl, blocksDiv, statusDiv);
      sessEl.appendChild(row);

      const formEl = document.createElement('div');
      formEl.className = 'fl-log-form';
      formEl.id = 'fl-form-' + s.id;
      sessEl.appendChild(formEl);

      body.appendChild(sessEl);
    });

    weekEl.append(head, body);
    container.appendChild(weekEl);
  });
}

// ═══════════════════════════════════════════════════
//  FREELETICS — LOG FORM
// ═══════════════════════════════════════════════════
let flActiveForm = null;

function flOpenLogForm(session, weekNum) {
  if (flActiveForm) { flActiveForm.classList.remove('open'); flActiveForm.innerHTML = ''; flActiveForm = null; }

  const formEl = document.getElementById('fl-form-' + session.id);
  if (!formEl) return;

  const seen = new Set();
  const unique = [];
  session.blocks.forEach(b => { if (!seen.has(b.name)) { seen.add(b.name); unique.push(b); } });

  const logs = flLoadLogs();
  const existing = logs[session.id];

  unique.forEach(b => {
    const isMax = FL_MAXES.includes(b.name);
    const prev  = existing?.results?.find(r => r.name === b.name);

    const row = document.createElement('div');
    row.className = 'fl-log-row';

    const nm = document.createElement('span');
    nm.className = 'fl-log-name'; nm.textContent = b.name;

    const inp = document.createElement('input');
    inp.className = 'fl-log-input';
    inp.type = isMax ? 'number' : 'text';
    inp.placeholder = isMax ? 'reps' : 'mm:ss';
    inp.dataset.name  = b.name;
    inp.dataset.isMax = isMax ? '1' : '0';
    if (prev?.value) inp.value = prev.value;
    inp.onkeydown = e => { if (e.key === 'Enter') flSaveLogForm(session, formEl, weekNum); };

    const hint = document.createElement('span');
    hint.className = 'fl-log-hint'; hint.textContent = isMax ? 'reps' : 'time';

    const starLbl = document.createElement('label');
    starLbl.className = 'fl-star-label';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.dataset.starFor = b.name;
    if (prev?.star) cb.checked = true;
    starLbl.append(cb, ' ★ star');

    row.append(nm, inp, hint, starLbl);
    formEl.appendChild(row);
  });

  const actions = document.createElement('div');
  actions.className = 'fl-log-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'fl-save-btn'; saveBtn.textContent = 'Save Session';
  saveBtn.onclick = () => flSaveLogForm(session, formEl, weekNum);

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'fl-cancel-log-btn'; cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => { formEl.classList.remove('open'); formEl.innerHTML = ''; flActiveForm = null; };

  actions.append(saveBtn, cancelBtn);
  formEl.appendChild(actions);
  formEl.classList.add('open');
  flActiveForm = formEl;

  const weekEl = document.querySelector('.fl-week[data-week="'+weekNum+'"]');
  if (weekEl && !weekEl.classList.contains('open')) {
    weekEl.classList.add('open'); flOpenWeeks.add(weekNum);
  }

  const firstInput = formEl.querySelector('.fl-log-input');
  if (firstInput) setTimeout(() => firstInput.focus(), 50);
}

function flSaveLogForm(session, formEl, weekNum) {
  const inputs  = formEl.querySelectorAll('.fl-log-input');
  const results = [];
  inputs.forEach(inp => {
    const name  = inp.dataset.name;
    const isMax = inp.dataset.isMax === '1';
    const value = inp.value.trim();
    const star  = formEl.querySelector('[data-star-for="'+name+'"]')?.checked || false;
    results.push({ name, value, star, isMax });
  });

  if (!results.some(r => r.value)) return;

  const logs = flLoadLogs();
  logs[session.id] = { date: new Date().toISOString().split('T')[0], results, level: flLoadLevel() };
  flSaveLogs(logs);

  const newPRs = flUpdatePRs(results);
  formEl.classList.remove('open'); formEl.innerHTML = ''; flActiveForm = null;
  renderFLProgram();
  renderFLPRs(newPRs);
}

function renderFLPRs(flashNames = []) {
  const prs = flLoadPRs();

    el.innerHTML = '';

//  FREELETICS — WORKOUT MODAL
// ═══════════════════════════════════════════════════
let flModalCtx    = null; // { name, sessionId }
let flTimerInterval = null;
let flTimerSecs     = 0;
let flTimerRunning  = false;

let flSwInterval  = null;
let flSwSecs      = 0;
let flSwRunning   = false;
let flSelectedRow = null;

// ── History helpers ──────────────────────────────
function flGetWorkoutHistory(name) {
  const logs = flLoadLogs();
  const out = [];
  Object.values(logs).forEach(log => {
    const r = (log.results || []).find(r => r.name === name);
    if (r?.value) out.push({ date: log.date || '', value: r.value, star: r.star || false, isMax: r.isMax || false, exercises: log.exercises?.[name] || [], level: log.level || null });
  });
  return out.sort((a, b) => a.date.localeCompare(b.date));
}

function flFmtDate(str) {
  if (!str) return '—';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function flBuildHistoryBody_UNUSED(name) {
  const body = document.getElementById('fl-modal-body');
  body.innerHTML = '';
  const hist = flGetWorkoutHistory(name);
  const def  = FL_WORKOUT_EXERCISES[name];

  if (!hist.length) {
    const empty = document.createElement('div');
    empty.className = 'fl-hist-empty';
    empty.textContent = 'No sessions logged yet for this workout.';
    body.appendChild(empty);
    return;
  }

  // ── Session timeline ───────────────────────────
  const sessionTitle = document.createElement('div');
  sessionTitle.className = 'fl-hist-section-title';
  sessionTitle.textContent = 'Sessions  (' + hist.length + ' total)';
  body.appendChild(sessionTitle);

  // Show most-recent first
  hist.slice().reverse().forEach((entry, revI) => {
    const origI = hist.length - 1 - revI;
    const prev  = hist[origI - 1];

    const sessionEl = document.createElement('div');
    sessionEl.className = 'fl-hist-session';

    const row = document.createElement('div');
    row.className = 'fl-hist-session-row';

    const dateEl = document.createElement('span');
    dateEl.className = 'fl-hist-date';
    dateEl.textContent = flFmtDate(entry.date);

    const valEl = document.createElement('span');
    valEl.className = 'fl-hist-val';
    valEl.textContent = entry.isMax ? entry.value + ' reps' : entry.value;
    if (entry.star) {
      const s = document.createElement('span');
      s.style.cssText = 'color:#ffc84d;margin-left:6px;font-size:13px;';
      s.textContent = '★'; valEl.appendChild(s);
    }

    const trendEl = document.createElement('span');
    trendEl.className = 'fl-hist-trend';
    if (!prev) {
      trendEl.textContent = 'first run'; trendEl.classList.add('same');
    } else if (entry.isMax) {
      const d = parseInt(entry.value) - parseInt(prev.value);
      if      (d > 0) { trendEl.textContent = '↑ +' + d + ' reps'; trendEl.classList.add('better'); }
      else if (d < 0) { trendEl.textContent = '↓ ' + d + ' reps'; trendEl.classList.add('worse'); }
      else            { trendEl.textContent = '→ same';              trendEl.classList.add('same'); }
    } else {
      const d = flParseMMSS(prev.value) - flParseMMSS(entry.value);
      if      (d > 0) { trendEl.textContent = '↑ ' + flSecsToMMSS(d) + ' faster'; trendEl.classList.add('better'); }
      else if (d < 0) { trendEl.textContent = '↓ ' + flSecsToMMSS(-d) + ' slower'; trendEl.classList.add('worse'); }
      else            { trendEl.textContent = '→ same';                               trendEl.classList.add('same'); }
    }

    const chevron = document.createElement('span');
    chevron.className = 'fl-hist-chevron'; chevron.textContent = '▾';

    row.append(dateEl, valEl, trendEl, chevron);

    // Exercise detail
    const detail = document.createElement('div');
    detail.className = 'fl-hist-detail';

    const exArr = entry.exercises;
    if (exArr.length) {
      const byRound = {};
      exArr.forEach(e => { if (e.time) { (byRound[e.ri] = byRound[e.ri] || []).push(e); } });
      if (Object.keys(byRound).length) {
        Object.entries(byRound).forEach(([riStr, exes]) => {
          const rd = def.rounds[+riStr]; if (!rd) return;
          const rl = document.createElement('div');
          rl.className = 'fl-hist-detail-round'; rl.textContent = rd.label;
          detail.appendChild(rl);
          exes.forEach(e => {
            const set = rd.sets[e.si]; if (!set) return;
            const dr = document.createElement('div'); dr.className = 'fl-hist-detail-ex-row';
            const n = document.createElement('span'); n.className = 'fl-hist-detail-ex'; n.textContent = set.ex;
            const t = document.createElement('span'); t.className = 'fl-hist-detail-time'; t.textContent = e.time;
            const st = document.createElement('span'); st.className = 'fl-hist-detail-state';
            st.textContent = e.state === 'done' ? '✓' : e.state === 'modified' ? '~' : '';
            st.style.color = e.state === 'done' ? '#4ddd8e' : '#ffc84d';
            dr.append(n, t, st); detail.appendChild(dr);
          });
        });
      } else {
        detail.innerHTML = '<div style="font-size:12px;color:var(--txt-dim);font-style:italic;padding:4px 0">No exercise times recorded for this session.</div>';
      }
    } else {
      detail.innerHTML = '<div style="font-size:12px;color:var(--txt-dim);font-style:italic;padding:4px 0">No exercise breakdown for this session.</div>';
    }

    row.onclick = () => { detail.classList.toggle('open'); chevron.textContent = detail.classList.contains('open') ? '▴' : '▾'; };
    sessionEl.append(row, detail);
    body.appendChild(sessionEl);
  });

  // ── Per-exercise progression ───────────────────
  if (def.logType !== 'max' && def.rounds.length) {
    const exTitle = document.createElement('div');
    exTitle.className = 'fl-hist-section-title fl-hist-ex-section';
    exTitle.textContent = 'Exercise Progression';
    body.appendChild(exTitle);

    // Collect unique exercise names in order
    const seen = new Set();
    const exNames = [];
    def.rounds.forEach(r => r.sets.forEach(s => { if (!seen.has(s.ex)) { seen.add(s.ex); exNames.push(s.ex); } }));

    exNames.forEach(exName => {
      // For each session, sum time across all rounds for this exercise
      const exSessions = hist.map(session => {
        let secs = 0;
        session.exercises.forEach(e => {
          const rd = def.rounds[e.ri]; if (!rd) return;
          if (rd.sets[e.si]?.ex === exName && e.time) secs += flParseMMSS(e.time);
        });
        return { date: session.date, secs };
      }).filter(s => s.secs > 0);

      if (!exSessions.length) return;

      const block = document.createElement('div'); block.className = 'fl-hist-ex-block';
      const nameEl = document.createElement('div'); nameEl.className = 'fl-hist-ex-name'; nameEl.textContent = exName;
      block.appendChild(nameEl);

      exSessions.forEach((s, i) => {
        const prev = exSessions[i - 1];
        const r = document.createElement('div'); r.className = 'fl-hist-ex-row';
        const d = document.createElement('span'); d.className = 'fl-hist-ex-date'; d.textContent = flFmtDate(s.date);
        const t = document.createElement('span'); t.className = 'fl-hist-ex-time'; t.textContent = flSecsToMMSS(s.secs);
        const tr = document.createElement('span'); tr.className = 'fl-hist-ex-trend';
        if (!prev) { tr.textContent = '—'; tr.classList.add('same'); }
        else {
          const diff = prev.secs - s.secs;
          if      (diff > 0) { tr.textContent = '↑ ' + flSecsToMMSS(diff) + ' faster'; tr.classList.add('better'); }
          else if (diff < 0) { tr.textContent = '↓ ' + flSecsToMMSS(-diff) + ' slower'; tr.classList.add('worse'); }
          else               { tr.textContent = '→ same'; tr.classList.add('same'); }
        }
        r.append(d, t, tr); block.appendChild(r);
      });
      body.appendChild(block);
    });
  }
}


function flSelectExRow(row) {
  if (flSelectedRow) flSelectedRow.classList.remove('fl-ex-selected');
  flSelectedRow = (flSelectedRow === row) ? null : row;
  if (flSelectedRow) flSelectedRow.classList.add('fl-ex-selected');

  const nameEl = document.getElementById('fl-sw-ex-name');
  const goBtn  = document.getElementById('fl-sw-go');
  if (nameEl) {
    if (flSelectedRow) {
      nameEl.textContent = (flSelectedRow.querySelector('.fl-ex-name')?.textContent || '') +
                           '  ·  ' + (flSelectedRow.querySelector('.fl-ex-reps')?.textContent || '');
      nameEl.classList.add('selected');
    } else {
      nameEl.textContent = 'Tap an exercise to time it';
      nameEl.classList.remove('selected');
    }
  }
  if (goBtn && !flSwRunning) goBtn.disabled = !flSelectedRow;
}

function flSwTick() {
  flSwSecs++;
  const clock = document.getElementById('fl-sw-clock');
  if (clock) clock.textContent = flSecsToMMSS(flSwSecs);
}

function flSwToggle() {
  const goBtn  = document.getElementById('fl-sw-go');
  const clock  = document.getElementById('fl-sw-clock');
  const stopBtn = document.getElementById('fl-sw-stop');
  if (flSwRunning) {
    clearInterval(flSwInterval); flSwInterval = null; flSwRunning = false;
    if (goBtn)  { goBtn.textContent = 'Resume'; goBtn.classList.add('paused'); }
    if (clock)  clock.classList.remove('running');
  } else {
    flSwRunning = true;
    if (goBtn)  { goBtn.textContent = 'Pause'; goBtn.classList.remove('paused'); }
    if (clock)  clock.classList.add('running');
    if (stopBtn) stopBtn.disabled = false;
    flSwInterval = setInterval(flSwTick, 1000);
  }
}

function flSwStop() {
  clearInterval(flSwInterval); flSwInterval = null; flSwRunning = false;
  if (flSelectedRow && flSwSecs > 0) {
    const inp = flSelectedRow.querySelector('.fl-ex-time-inp');
    if (inp) { inp.value = flSecsToMMSS(flSwSecs); flRecalcTotal(); }
  }
  flSwSecs = 0;
  const clock  = document.getElementById('fl-sw-clock');
  const goBtn  = document.getElementById('fl-sw-go');
  const stopBtn = document.getElementById('fl-sw-stop');
  if (clock)   { clock.textContent = '00:00'; clock.classList.remove('running'); }
  if (goBtn)   { goBtn.textContent = 'Start'; goBtn.classList.remove('paused'); goBtn.disabled = !flSelectedRow; }
  if (stopBtn) stopBtn.disabled = true;
}

function flParseDuration(str) {
  const m = str.match(/(\d+)\s*min/);
  if (m) return parseInt(m[1]) * 60;
  const s = str.match(/(\d+)\s*sec/);
  if (s) return parseInt(s[1]);
  return 300;
}

function flPlayDone() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const beep = (freq, start, dur) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.28, ac.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + dur);
      osc.start(ac.currentTime + start);
      osc.stop(ac.currentTime + start + dur);
    };
    beep(880,  0.00, 0.14);
    beep(880,  0.18, 0.14);
    beep(1100, 0.36, 0.40);
  } catch(e) {}
}

function flTimerTick() {
  flTimerSecs--;
  const display = document.getElementById('fl-timer-display');
  const btn     = document.getElementById('fl-timer-btn');
  if (flTimerSecs <= 0) {
    flTimerSecs = 0;
    clearInterval(flTimerInterval); flTimerInterval = null; flTimerRunning = false;
    if (display) { display.textContent = '00:00'; display.classList.remove('fl-timer-urgent'); display.classList.add('fl-timer-done'); }
    if (btn)     { btn.textContent = 'Restart'; btn.classList.remove('fl-timer-running'); }
    flPlayDone();
  } else {
    if (display) {
      display.textContent = flSecsToMMSS(flTimerSecs);
      if (flTimerSecs <= 30) display.classList.add('fl-timer-urgent');
    }
  }
}

function flToggleTimer() {
  const btn = document.getElementById('fl-timer-btn');
  if (flTimerRunning) {
    clearInterval(flTimerInterval); flTimerInterval = null; flTimerRunning = false;
    if (btn) { btn.textContent = flTimerSecs > 0 ? 'Resume' : 'Restart'; btn.classList.remove('fl-timer-running'); }
  } else {
    if (flTimerSecs <= 0) {
      const def = FL_WORKOUT_EXERCISES[flModalCtx?.name];
      if (def) flTimerSecs = flParseDuration(def.duration);
      const display = document.getElementById('fl-timer-display');
      if (display) { display.classList.remove('fl-timer-done','fl-timer-urgent'); display.textContent = flSecsToMMSS(flTimerSecs); }
    }
    flTimerRunning = true;
    if (btn) { btn.textContent = 'Pause'; btn.classList.add('fl-timer-running'); }
    flTimerInterval = setInterval(flTimerTick, 1000);
  }
}

function flParseMMSS(str) {
  if (!str) return 0;
  str = str.trim();
  if (str.includes(':')) {
    const [m, s] = str.split(':').map(Number);
    return ((isNaN(m) ? 0 : m) * 60) + (isNaN(s) ? 0 : s);
  }
  return parseInt(str) || 0;
}

function flSecsToMMSS(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function flRecalcTotal() {
  let total = 0;
  document.querySelectorAll('#fl-modal-body .fl-ex-time-inp').forEach(inp => {
    total += flParseMMSS(inp.value);
  });
  const el = document.getElementById('fl-modal-total');
  if (!el) return;
  if (total > 0) {
    el.textContent = flSecsToMMSS(total);
    el.classList.remove('dim');
  } else {
    el.textContent = '—';
    el.classList.add('dim');
  }
}

function flOpenWorkoutModal(name, sessionId) {

    exName.textContent = 'Tap an exercise to time it';

    clock.id = 'fl-sw-clock'; clock.className = 'fl-sw-clock';

  // ── Body ────────────────────────────
