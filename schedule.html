<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoSelf</title>
<style>
:root {
  --hour-h:  54px;
  --time-w:  52px;
  --head-h:  62px;
  --bg:      #0d0d0d;
  --line:    rgba(255,255,255,0.07);
  --line-sm: rgba(255,255,255,0.03);
  --col-sep: rgba(255,255,255,0.07);
  --txt:     #e8eaed;
  --txt-mid: #9aa0a6;
  --txt-dim: #5f6368;
  --blue:    #1a73e8;
  --tab-h:   44px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--txt);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════════════════
   APP SHELL + TAB BAR
══════════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#topbar {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  height: var(--tab-h);
  background: #111;
  border-bottom: 1px solid var(--line);
  padding: 0 16px;
  gap: 4px;
  z-index: 300;
}

.app-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--txt);
  letter-spacing: 0.5px;
  margin-right: 16px;
  user-select: none;
}

.tab-btn {
  padding: 5px 16px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--txt-dim);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--txt-mid); }
.tab-btn.active {
  background: rgba(26,115,232,0.12);
  border-color: rgba(26,115,232,0.35);
  color: #7aa8ff;
}

/* ══════════════════════════════════════════════════════
   PANELS
══════════════════════════════════════════════════════ */
.panel {
  display: none;
  flex: 1;
  min-height: 0;
  flex-direction: column;
}
.panel.active { display: flex; }

/* ══════════════════════════════════════════════════════
   SCHEDULE (TAB 1)
══════════════════════════════════════════════════════ */
.cal {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.cal-head {
  display: flex;
  flex-shrink: 0;
  height: var(--head-h);
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 100;
}

.cal-corner {
  width: var(--time-w);
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 0 8px 10px 0;
  font-size: 10px;
  color: var(--txt-dim);
  user-select: none;
  letter-spacing: 0.5px;
}

.day-head {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  border-left: 1px solid var(--col-sep);
}

.day-abbr {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--txt-dim);
}

.day-num {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 300;
  color: var(--txt-mid);
  line-height: 1;
}

.day-head.today { background: rgba(255,255,255,0.04); }
.day-head.today .day-abbr { color: var(--blue); }
.day-head.today .day-num  { background: var(--blue); color: #fff; font-weight: 500; }

.cal-body {
  flex: 1;
  display: flex;
  overflow-y: scroll;
  overflow-x: hidden;
}

.cal-times {
  width: var(--time-w);
  flex-shrink: 0;
  position: relative;
  height: calc(var(--hour-h) * 24);
}

.t-label {
  position: absolute;
  right: 8px;
  font-size: 10px;
  color: var(--txt-dim);
  line-height: 1;
  transform: translateY(-50%);
  user-select: none;
  white-space: nowrap;
  letter-spacing: 0.2px;
}

.cal-grid {
  flex: 1;
  display: flex;
  position: relative;
  height: calc(var(--hour-h) * 24);
  background-image: repeating-linear-gradient(
    to bottom,
    var(--line)    0px,
    var(--line)    1px,
    transparent    1px,
    transparent    var(--hour-h)
  );
  background-size: 100% var(--hour-h);
}

.cal-grid::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent                       0,
    transparent                       calc(var(--hour-h) / 2),
    var(--line-sm)                    calc(var(--hour-h) / 2),
    var(--line-sm)                    calc(var(--hour-h) / 2 + 1px),
    transparent                       calc(var(--hour-h) / 2 + 1px),
    transparent                       var(--hour-h)
  );
  background-size: 100% var(--hour-h);
}

.day-col {
  flex: 1;
  min-width: 0;
  position: relative;
  border-left: 1px solid var(--col-sep);
}
.day-col.today { background: rgba(255,255,255,0.04); }

.ev {
  position: absolute;
  border-radius: 4px;
  padding: 3px 6px;
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 1px;
  border-left: 3px solid;
  transition: filter 0.12s;
  box-sizing: border-box;
}
.ev:hover { filter: brightness(1.15); }

.ev.sleep    { background: #1e3a7a; border-color: #5b8eff; }
.ev.work     { background: #7a2a22; border-color: #ff6b5b; }
.ev.workout  { background: #1a5c3a; border-color: #4ddd8e; }
.ev.learning { background: #6b5210; border-color: #ffc84d; }
.ev.hygiene  { background: #163040; border-color: #40c0e0; }
.ev.family   { background: #0f5050; border-color: #4dddce; }
.ev.sports   { background: #3d1f6e; border-color: #a06bff; }
.ev.walk     { background: #1a5c28; border-color: #5ddd78; }
.ev.errands  { background: #4a1a6b; border-color: #c46bff; }
.ev.social   { background: #7a3a1a; border-color: #ff8c5b; }
.ev.free     { background: #2a2d40; border-color: #7880aa; }

.ev-title {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.ev-time {
  font-size: 10px;
  color: rgba(255,255,255,0.50);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.ev-sublabel {
  font-size: 10px;
  color: rgba(255,255,255,0.40);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: #ea4335;
  z-index: 20;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ea4335;
}
.now-label {
  position: absolute;
  right: 6px;
  font-size: 10px;
  font-weight: 600;
  color: #ea4335;
  line-height: 1;
  transform: translateY(-50%);
  user-select: none;
  white-space: nowrap;
  z-index: 21;
}

/* ══════════════════════════════════════════════════════
   TRACKER (TAB 2)
══════════════════════════════════════════════════════ */

/* ── Inner sub-tabs ── */
.tr-tab-bar {
  display: flex; border-bottom: 1px solid var(--line);
  padding: 0 24px; flex-shrink: 0; background: #111;
}
.tr-tab-btn {
  padding: 11px 18px; background: none; border: none; border-radius: 0;
  font-size: 12px; font-weight: 600; letter-spacing: 0.3px; font-family: inherit;
  color: var(--txt-dim); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}
.tr-tab-btn:hover:not(.active) { color: var(--txt-mid); }
.tr-tab-btn.active { color: var(--txt); border-bottom-color: rgba(255,255,255,0.55); }


.tr-panel { display: none; flex: 1; min-height: 0; flex-direction: column; }
.tr-panel.active { display: flex; }

/* ── Daily panel ── */
.tracker-wrap { flex: 1; overflow: auto; }

#tracker-table { border-collapse: collapse; font-size: 12px; table-layout: fixed; }

#tracker-table thead th {
  position: sticky; top: 0; background: #161616;
  padding: 9px 4px; text-align: center;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  color: var(--txt-dim); border-bottom: 1px solid rgba(255,255,255,0.10);
  border-right: 1px solid var(--line); white-space: nowrap; z-index: 10;
  width: 78px; overflow: hidden;
}
#tracker-table thead th:first-child {
  text-align: left; position: sticky; left: 0; z-index: 20;
  background: #161616; padding-left: 16px; width: 128px;
}
#tracker-table thead th.tr-off-th { opacity: 0.35; }
#tracker-table thead th:last-child { border-right: none; }

/* Data rows */
#tracker-table tbody tr { border-bottom: 1px solid var(--line); }
#tracker-table tbody tr:last-child { border-bottom: none; }

/* Date cell */
td.tr-date {
  position: sticky; left: 0; background: #0d0d0d;
  padding: 0 14px 0 16px; white-space: nowrap;
  font-size: 12px; color: var(--txt-mid);
  border-right: 1px solid rgba(255,255,255,0.10);
  height: 42px; z-index: 5; vertical-align: middle; min-width: 128px;
}
tr.tr-today td.tr-date {
  color: #ff8fab; background: rgba(255,139,175,0.06);
  font-weight: 600;
}
tr.tr-future td.tr-date { color: rgba(255,255,255,0.22); }
tr.tr-future td.tr-cell { opacity: 0.28; }
tr.tr-future td.tr-pct  { opacity: 0.28; }

/* % cell */
td.tr-pct {
  text-align: center; padding: 0 6px; width: 52px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
  border-right: 1px solid var(--line); vertical-align: middle;
}
td.tr-pct.p0   { color: rgba(255,255,255,0.16); }
td.tr-pct.plow { color: #ff6b5b; }
td.tr-pct.pmid { color: #ffc84d; }
td.tr-pct.phi  { color: #4ddd8e; }

/* Activity cells — reference-image style */
td.tr-cell {
  text-align: center; width: 78px; height: 42px;
  border-right: 1px solid var(--line); cursor: pointer;
  transition: background 0.10s; vertical-align: middle;
}
td.tr-cell:last-child { border-right: none; }
td.tr-cell::after {
  content: ''; display: inline-block;
  width: 16px; height: 16px;
  border: 1.5px solid rgba(255,255,255,0.13); border-radius: 3px; vertical-align: middle;
}
td.tr-cell.checked { background: #1c4530; }
td.tr-cell.checked::after {
  content: '✓'; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.88);
  border: none; width: auto; height: auto; line-height: 1;
}
td.tr-cell.discarded { background: rgba(255,255,255,0.02); }
td.tr-cell.discarded::after {
  content: '–'; font-size: 15px; color: rgba(255,255,255,0.16);
  border: none; width: auto; height: auto; line-height: 1;
}
td.tr-cell:not(.checked):not(.discarded):not(.na):not(.tr-off):hover { background: rgba(255,255,255,0.04); }
td.tr-cell.discarded:hover { background: rgba(255,255,255,0.05); }
tr.tr-today td.tr-cell::after { border-color: rgba(255,139,175,0.22); }
tr.tr-today td.tr-cell.checked { background: #1c4530; }
td.tr-cell.na    { cursor: default; }
td.tr-cell.na::after { display: none; }
td.tr-cell.tr-off { cursor: default; opacity: 0.18; }
td.tr-cell.tr-off::after { display: none; }

/* ── Monthly panel ── */
.tracker-monthly-wrap {
  flex: 1; overflow-y: auto; padding: 24px 28px 40px;
  display: flex; flex-direction: column; gap: 32px;
}
.tr-quarter-section { display: flex; flex-direction: column; gap: 14px; }
.tr-quarter-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}
.tr-month-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
}
.tr-month-card {
  background: rgba(255,255,255,0.02); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column; height: 232px;
}
.tr-month-card.is-current { border-color: rgba(255,139,175,0.28); background: rgba(255,139,175,0.025); }
.tr-month-card.is-past    { opacity: 0.58; }
.tr-month-name {
  padding: 11px 14px 9px; font-size: 13px; font-weight: 600; color: var(--txt-mid);
  border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px;
}
.tr-month-name.cur { color: #ff8fab; }
.tr-month-items { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow: hidden; }
.tr-month-item {
  display: flex; align-items: center; gap: 9px; padding: 7px 8px;
  border-radius: 7px; cursor: pointer; transition: background 0.12s;
}
.tr-month-item:hover { background: rgba(255,255,255,0.04); }
.tr-month-item.disabled { opacity: 0.30; pointer-events: none; }
.tr-mi-box {
  width: 17px; height: 17px; border: 1.5px solid rgba(255,255,255,0.14); border-radius: 4px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #4ddd8e;
}
.tr-month-item.done .tr-mi-box { border-color: rgba(77,221,142,0.35); }
.tr-month-item.done .tr-mi-box::after { content: '✓'; }
.tr-month-item.travel .tr-mi-box { border-color: rgba(255,200,77,0.30); color: #ffc84d; }
.tr-month-item.travel.done .tr-mi-box { border-color: rgba(255,200,77,0.35); }
.tr-mi-lbl { font-size: 12px; color: var(--txt-mid); }

/* ── Streaks panel ── */
.tracker-streaks-wrap {
  flex: 1; overflow-y: auto; padding: 24px 28px 40px;
  display: flex; flex-direction: column; gap: 28px;
}
.streaks-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.9px; text-transform: uppercase;
  color: rgba(255,255,255,0.28); margin-bottom: 14px;
}
.streaks-chart-section { display: flex; flex-direction: column; }
.streaks-habits-section { display: flex; flex-direction: column; }
.streaks-habit-list { display: flex; flex-direction: column; gap: 5px; }
.streaks-habit-row {
  display: flex; align-items: center; gap: 16px;
  padding: 9px 14px; border-radius: 8px;
  background: rgba(255,255,255,0.015);
  border: 1px solid rgba(255,255,255,0.04);
  transition: background 0.12s;
}
.streaks-habit-row:hover { background: rgba(255,255,255,0.03); }
.streaks-habit-name {
  display: flex; align-items: center; gap: 8px;
  width: 126px; flex-shrink: 0;
  font-size: 12px; color: var(--txt-mid); white-space: nowrap;
}
.streaks-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.streaks-cells { display: flex; gap: 2px; flex: 1; }
.streaks-cell {
  width: 10px; height: 18px; border-radius: 2px; flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  transition: background 0.1s;
}
.streaks-cell.today-cell { box-shadow: 0 0 0 1px rgba(255,139,175,0.40); }
.streaks-count {
  width: 54px; text-align: right;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  letter-spacing: -0.2px;
}

/* ══════════════════════════════════════════════════════
   BACKLOG (TAB 3)
══════════════════════════════════════════════════════ */
.backlog-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 24px 32px;
  gap: 16px;
}

.backlog-top {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

#backlog-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px;
  padding: 10px 16px;
  color: var(--txt);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
#backlog-input:focus {
  border-color: rgba(160,107,255,0.45);
  background: rgba(255,255,255,0.07);
}
#backlog-input::placeholder { color: var(--txt-dim); }

#backlog-add-btn {
  padding: 10px 22px;
  background: rgba(160,107,255,0.12);
  border: 1px solid rgba(160,107,255,0.30);
  border-radius: 10px;
  color: #b07aff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.3px;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
}
#backlog-add-btn:hover {
  background: rgba(160,107,255,0.22);
  border-color: rgba(160,107,255,0.50);
}

.backlog-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.bl-filter {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.07);
  background: transparent;
  color: var(--txt-dim);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.3px;
  transition: color 0.12s, background 0.12s, border-color 0.12s;
}
.bl-filter:hover { color: var(--txt-mid); }
.bl-filter.active {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.18);
  color: var(--txt);
}

.backlog-table-wrap { flex: 1; overflow-y: auto; }

#backlog-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
}
#backlog-table thead th {
  position: sticky;
  top: 0;
  background: #161616;
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--txt-dim);
  border-bottom: 1px solid rgba(255,255,255,0.10);
  white-space: nowrap;
  z-index: 10;
  cursor: pointer;
  user-select: none;
}
#backlog-table thead th:hover { color: var(--txt-mid); }
#backlog-table thead th.bl-sort-active { color: var(--txt); }
#backlog-table tbody tr {
  border-bottom: 1px solid var(--line);
  transition: background 0.1s;
}
#backlog-table tbody tr:last-child { border-bottom: none; }
#backlog-table tbody tr:hover { background: rgba(255,255,255,0.02); }
#backlog-table td { padding: 13px 14px; vertical-align: middle; }

.bl-task-text { color: var(--txt); font-size: 13px; line-height: 1.4; }
.bl-row-done    .bl-task-text { text-decoration: line-through; color: var(--txt-dim); }
.bl-row-dropped .bl-task-text { text-decoration: line-through; color: var(--txt-dim); opacity: 0.5; }

.bl-cat-badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;
  min-width: 94px;
  text-align: center;
  box-sizing: border-box;
}

.bl-date      { font-size: 12px; color: var(--txt-mid); white-space: nowrap; }
.bl-date-none { font-size: 12px; color: var(--txt-dim); white-space: nowrap; cursor: pointer; }
.bl-date.editable { cursor: pointer; }
.bl-days-remain { font-size: 12px; color: #4ddd8e; white-space: nowrap; font-weight: 500; }
.bl-days-due    { font-size: 12px; color: #ff6b5b; white-space: nowrap; font-weight: 500; }
.bl-days-today  { font-size: 12px; color: #ffc84d; white-space: nowrap; font-weight: 500; }
.bl-days-none   { font-size: 12px; color: var(--txt-dim); white-space: nowrap; }
.bl-inline-edit {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(160,107,255,0.40);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--txt);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  width: 100%;
  box-sizing: border-box;
}
.bl-date-input { width: 138px; color-scheme: dark; }
.bl-cat-badge  { cursor: pointer; }

.bl-status-cell { white-space: nowrap; }
.bl-status-badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.bl-st-todo    { background: rgba(255,255,255,0.06); color: var(--txt-mid); border: 1px solid rgba(255,255,255,0.10); }
.bl-st-done    { background: rgba(77,221,142,0.10);  color: #4ddd8e;        border: 1px solid rgba(77,221,142,0.22); }
.bl-st-dropped { background: rgba(255,255,255,0.03); color: var(--txt-dim); border: 1px solid rgba(255,255,255,0.07); }

.bl-actions { display: inline-flex; gap: 4px; margin-left: 6px; }
.bl-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--txt-dim);
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.bl-btn:hover      { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }
.bl-btn.done:hover { background: rgba(77,221,142,0.12);  border-color: rgba(77,221,142,0.30);  color: #4ddd8e; }
.bl-btn.drop:hover { background: rgba(255,107,91,0.10);  border-color: rgba(255,107,91,0.25);  color: #ff6b5b; }
.bl-btn.undo:hover { background: rgba(255,200,77,0.10);  border-color: rgba(255,200,77,0.25);  color: #ffc84d; }
.bl-btn.del:hover  { background: rgba(255,107,91,0.10);  border-color: rgba(255,107,91,0.25);  color: #ff6b5b; }

.backlog-empty {
  text-align: center;
  padding: 60px 20px;
  font-size: 13px;
  color: var(--txt-dim);
}

/* ══════════════════════════════════════════════════════
   GOALS (TAB 4)
══════════════════════════════════════════════════════ */
.goals-wrap {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  display: flex; flex-direction: column; gap: 28px;
}

.goals-header {
  display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}

.goals-year-label {
  font-size: 13px; font-weight: 600;
  color: var(--txt-mid); letter-spacing: 0.5px;
}

.add-goal-btn {
  padding: 7px 16px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  color: var(--txt-mid); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit; letter-spacing: 0.3px;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.add-goal-btn:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.18); color: var(--txt);
}

/* ── Goal section ─────────────────────────────────── */
.goal-section {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px; overflow: hidden;
}

.goal-section-head {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 24px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.goal-section-icon { font-size: 22px; line-height: 1; }

.goal-section-title {
  flex: 1; font-size: 16px; font-weight: 700;
  color: var(--txt); letter-spacing: -0.3px;
}

.goal-section-del {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer; color: var(--txt-dim);
  font-size: 12px; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.12s, background 0.12s, color 0.12s;
}
.goal-section:hover .goal-section-del { opacity: 1; }
.goal-section-del:hover { background: rgba(255,107,91,0.12); color: #ff6b5b; }

.goal-levels { display: flex; flex-direction: column; }

/* ── Level: passed + collapsed ─────────────────────── */
.level-card { border-top: 1px solid rgba(255,255,255,0.05); }
.level-card.passed-collapsed { background: rgba(77,221,142,0.02); }

.level-passed-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.level-passed-row:hover { background: rgba(255,255,255,0.02); }

.level-passed-check {
  width: 16px; height: 16px; border-radius: 4px;
  background: rgba(77,221,142,0.15); border: 1.5px solid rgba(77,221,142,0.50);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #4ddd8e; flex-shrink: 0;
}

.level-passed-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--txt-dim); }
.level-passed-date  { font-size: 11px; color: var(--txt-dim); flex-shrink: 0; }
.level-passed-chevron {
  font-size: 9px; color: var(--txt-dim); flex-shrink: 0; transition: transform 0.2s;
}
.level-card.passed-collapsed.open .level-passed-chevron { transform: rotate(90deg); }

.level-passed-body { display: none; padding: 4px 0 16px; }
.level-card.passed-collapsed.open .level-passed-body { display: block; }

/* ── Level: locked ──────────────────────────────────── */
.level-card.locked { opacity: 0.38; pointer-events: none; }

.level-locked-row {
  display: flex; align-items: center; gap: 12px; padding: 14px 24px;
}

.level-lock-icon { font-size: 12px; color: var(--txt-dim); flex-shrink: 0; }
.level-locked-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--txt-dim); }
.level-locked-count { font-size: 11px; color: var(--txt-dim); }

/* ── Level: active ──────────────────────────────────── */
.level-card.active { background: rgba(255,255,255,0.012); }

.level-active-head {
  display: flex; align-items: center; gap: 10px; padding: 16px 24px 10px;
}

.level-num-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; padding: 3px 9px;
  border-radius: 6px; flex-shrink: 0;
}

.level-active-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--txt); }

/* ── Habit section labels ──────────────────────────── */
.habit-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 10px 24px 4px;
  color: var(--txt-dim); opacity: 0.5;
}

/* ── Habit row ─────────────────────────────────────── */
.habit-row {
  display: flex; align-items: center; gap: 12px;
  padding: 5px 24px; overflow: hidden;
}

.habit-label {
  font-size: 12px; color: var(--txt-mid);
  min-width: 160px; width: 160px; flex-shrink: 0; line-height: 1.3;
}

.habit-row.carried .habit-label { color: var(--txt-dim); }

/* ── Checkbox strip ────────────────────────────────── */
.check-strip { display: flex; gap: 2px; align-items: center; }

.check-box {
  width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: background 0.1s, border-color 0.1s;
}

.check-box:hover { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.10); }
.check-box.today { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.30); }
.check-box.checked { border-color: transparent; }

/* ── Level footer ──────────────────────────────────── */
.level-footer {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 10px 24px 18px;
}

.level-pass-btn {
  padding: 7px 20px; background: rgba(255,200,77,0.06);
  border: 1px solid rgba(255,200,77,0.20); border-radius: 10px;
  color: rgba(255,200,77,0.65); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; letter-spacing: 0.3px;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.level-pass-btn:hover {
  background: rgba(255,200,77,0.14); border-color: rgba(255,200,77,0.45); color: #ffc84d;
}

/* ── Pass confirmation modal ───────────────────────── */
.pass-modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.60); z-index: 500;
  align-items: center; justify-content: center;
}
.pass-modal-backdrop.open { display: flex; }

.pass-modal {
  background: #1c1c1c; border: 1px solid rgba(255,200,77,0.18);
  border-radius: 16px; padding: 28px; width: 360px;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 24px 56px rgba(0,0,0,0.50);
}

.pass-modal h3 { font-size: 15px; font-weight: 700; color: var(--txt); }
.pass-modal p  { font-size: 13px; color: var(--txt-mid); line-height: 1.6; }

.pass-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

.pass-modal-cancel {
  padding: 8px 18px; background: transparent;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 9px;
  color: var(--txt-dim); font-size: 13px; cursor: pointer; font-family: inherit;
  transition: border-color 0.12s, color 0.12s;
}
.pass-modal-cancel:hover { border-color: rgba(255,255,255,0.22); color: var(--txt-mid); }

.pass-modal-confirm {
  padding: 8px 20px; background: rgba(255,200,77,0.12);
  border: 1px solid rgba(255,200,77,0.35); border-radius: 9px;
  color: #ffc84d; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
}
.pass-modal-confirm:hover { background: rgba(255,200,77,0.22); border-color: rgba(255,200,77,0.55); }

/* ── New goal modal ────────────────────────────────── */
.goal-modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 500;
  align-items: center; justify-content: center;
}
.goal-modal-backdrop.open { display: flex; }

.goal-modal {
  background: #1a1a1a; border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px; padding: 28px; width: 360px;
  display: flex; flex-direction: column; gap: 18px;
}
.goal-modal h3 { font-size: 15px; font-weight: 600; color: var(--txt); }

.gm-field { display: flex; flex-direction: column; gap: 6px; }
.gm-field label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--txt-dim);
}
.gm-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 9px; padding: 9px 12px;
  color: var(--txt); font-size: 13px; font-family: inherit;
  outline: none; transition: border-color 0.15s;
}
.gm-input:focus { border-color: rgba(255,255,255,0.25); }

.gm-actions { display: flex; gap: 10px; justify-content: flex-end; }
.gm-cancel {
  padding: 8px 18px; background: transparent;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 9px;
  color: var(--txt-dim); font-size: 13px; cursor: pointer; font-family: inherit;
  transition: border-color 0.12s, color 0.12s;
}
.gm-cancel:hover { border-color: rgba(255,255,255,0.20); color: var(--txt-mid); }
.gm-submit {
  padding: 8px 18px; background: rgba(255,200,77,0.12);
  border: 1px solid rgba(255,200,77,0.30); border-radius: 9px;
  color: #ffc84d; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
}
.gm-submit:hover { background: rgba(255,200,77,0.22); border-color: rgba(255,200,77,0.50); }

/* ══════════════════════════════════════════════════════
   FREELETICS (TAB 5)
══════════════════════════════════════════════════════ */
.fl-wrap { flex:1; display:flex; min-height:0; overflow:hidden; }

.fl-program {
  flex:1; overflow-y:auto; padding:28px 32px;
  border-right:1px solid var(--line);
  display:flex; flex-direction:column; gap:12px;
}

.fl-sidebar {
  width:280px; flex-shrink:0; overflow-y:auto;
  padding:24px 20px; display:flex; flex-direction:column; gap:20px;
}

/* Week accordion */
.fl-week { border-radius:12px; border:1px solid rgba(255,255,255,0.07); overflow:hidden; background:rgba(255,255,255,0.02); flex-shrink:0; }
.fl-week.fl-hell    { border-color:rgba(255,107,53,0.25); background:rgba(255,60,0,0.04); }
.fl-week.fl-current { border-color:rgba(255,150,80,0.35); }

.fl-week-head {
  display:flex; align-items:center; gap:12px;
  padding:18px 22px; cursor:pointer; user-select:none;
  transition:background 0.12s;
}
.fl-week-head:hover { background:rgba(255,255,255,0.03); }

.fl-week-chevron { font-size:10px; color:var(--txt-dim); transition:transform 0.2s; flex-shrink:0; }
.fl-week.open .fl-week-chevron { transform:rotate(90deg); }

.fl-week-label { font-size:13px; font-weight:600; color:var(--txt-mid); flex:1; }
.fl-week.fl-current .fl-week-label { color:#ff9050; }
.fl-week.fl-hell    .fl-week-label { color:#ff6b35; }

.fl-week-prog-wrap { display:flex; align-items:center; gap:8px; }
.fl-week-prog-bar  { width:80px; height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
.fl-week-prog-fill { height:100%; border-radius:2px; background:#ff6b35; transition:width 0.3s ease; }
.fl-week-prog-text { font-size:11px; color:var(--txt-dim); white-space:nowrap; }

.fl-week-body { display:none; border-top:1px solid rgba(255,255,255,0.05); }
.fl-week.open .fl-week-body { display:block; }

.fl-challenge {
  padding:12px 22px; font-size:11px; color:#ff9050;
  background:rgba(255,107,53,0.07); border-bottom:1px solid rgba(255,107,53,0.10);
  display:flex; align-items:center; gap:6px;
}

/* Sessions */
.fl-session { border-bottom:1px solid rgba(255,255,255,0.04); }
.fl-session:last-child { border-bottom:none; }
.fl-session.done .fl-session-row { opacity:0.72; }

.fl-session-row {
  display:flex; align-items:center; gap:12px;
  padding:16px 22px; transition:background 0.1s;
}
.fl-session-row:hover { background:rgba(255,255,255,0.02); }

.fl-session-label { font-size:12px; color:var(--txt-dim); font-weight:600; letter-spacing:0.4px; width:82px; flex-shrink:0; }

.fl-blocks { display:flex; align-items:center; gap:5px; flex:1; flex-wrap:wrap; }

.fl-block-badge {
  display:inline-flex; align-items:center; padding:5px 12px;
  border-radius:8px; font-size:12px; font-weight:600; white-space:nowrap;
}
.fl-block-badge.workout { background:rgba(255,107,53,0.12); color:#ff8050; border:1px solid rgba(255,107,53,0.20); }
.fl-block-badge.max     { background:rgba(160,107,255,0.12); color:#b07aff; border:1px solid rgba(160,107,255,0.20); }

.fl-block-sep { font-size:10px; color:var(--txt-dim); padding:0 2px; }

.fl-session-status { font-size:11px; display:flex; align-items:center; gap:6px; flex-shrink:0; }

.fl-done-badge { font-size:11px; font-weight:600; color:#4ddd8e; }

.fl-log-btn {
  padding:4px 12px; border-radius:8px;
  border:1px solid rgba(255,107,53,0.30); background:rgba(255,107,53,0.08);
  color:#ff8050; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit;
  transition:background 0.12s, border-color 0.12s;
}
.fl-log-btn:hover { background:rgba(255,107,53,0.18); border-color:rgba(255,107,53,0.50); }

.fl-edit-btn {
  padding:4px 10px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.08); background:transparent;
  color:var(--txt-dim); font-size:11px; cursor:pointer; font-family:inherit;
  transition:background 0.12s;
}
.fl-edit-btn:hover { background:rgba(255,255,255,0.06); color:var(--txt-mid); }

/* Log form */
.fl-log-form {
  display:none; padding:16px 22px 18px;
  background:rgba(255,255,255,0.025); border-top:1px solid rgba(255,255,255,0.04);
  flex-direction:column; gap:12px;
}
.fl-log-form.open { display:flex; }

.fl-log-row { display:flex; align-items:center; gap:10px; }

.fl-log-name { font-size:12px; font-weight:600; color:var(--txt-mid); width:120px; flex-shrink:0; }

.fl-log-input {
  width:88px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10); border-radius:7px;
  padding:5px 9px; color:var(--txt); font-size:12px; font-family:inherit;
  outline:none; transition:border-color 0.15s;
}
.fl-log-input:focus { border-color:rgba(255,107,53,0.40); }
.fl-log-input::placeholder { color:var(--txt-dim); }

.fl-log-hint { font-size:10px; color:var(--txt-dim); }

.fl-star-label {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--txt-dim); cursor:pointer; user-select:none;
}
.fl-star-label input { accent-color:#ffc84d; }

.fl-log-actions { display:flex; gap:8px; padding-top:2px; }

.fl-save-btn {
  padding:6px 18px; background:rgba(255,107,53,0.12);
  border:1px solid rgba(255,107,53,0.30); border-radius:8px;
  color:#ff8050; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;
  transition:background 0.12s;
}
.fl-save-btn:hover { background:rgba(255,107,53,0.24); }

.fl-cancel-log-btn {
  padding:6px 14px; background:transparent;
  border:1px solid rgba(255,255,255,0.08); border-radius:8px;
  color:var(--txt-dim); font-size:12px; cursor:pointer; font-family:inherit;
}
.fl-cancel-log-btn:hover { background:rgba(255,255,255,0.05); }

/* PR board */
.fl-pr-section { display:flex; flex-direction:column; gap:8px; }

.fl-pr-title {
  font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
  color:var(--txt-dim); padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.07);
}

.fl-pr-row {
  display:flex; align-items:center; gap:8px;
  padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04);
}
.fl-pr-row:last-child { border-bottom:none; }

.fl-pr-name  { flex:1; font-size:12px; color:var(--txt-mid); font-weight:500; }
.fl-pr-value { font-size:12px; font-weight:700; color:var(--txt-dim); white-space:nowrap; }
.fl-pr-value.has-pr { color:#ff9050; }
.fl-pr-star  { font-size:11px; color:#ffc84d; width:12px; }
.fl-pr-date  { font-size:10px; color:var(--txt-dim); white-space:nowrap; }

@keyframes fl-pr-flash {
  0%,100% { background:transparent; }
  40%     { background:rgba(255,107,53,0.18); }
}
.fl-pr-row.new-pr { animation:fl-pr-flash 1s ease; border-radius:6px; }

/* ── Workout detail modal ─────────────────────────── */
.fl-modal-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.65); z-index:600;
  align-items:center; justify-content:center;
}
.fl-modal-backdrop.open { display:flex; }

.fl-modal {
  background:#181818;
  border:1px solid rgba(255,107,53,0.22);
  border-radius:20px; width:540px; max-height:88vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,0.55);
}

.fl-modal-head {
  display:flex; align-items:flex-start; justify-content:space-between;
  padding:22px 26px 16px; border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.fl-modal-name { font-size:22px; font-weight:700; color:#ff8050; letter-spacing:-0.4px; margin-bottom:5px; }
.fl-modal-equip { font-size:11px; color:var(--txt-dim); margin-bottom:3px; }
.fl-modal-notes { font-size:11px; color:var(--txt-dim); font-style:italic; }

.fl-modal-close {
  width:30px; height:30px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.08); background:transparent;
  color:var(--txt-dim); cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.12s; flex-shrink:0; margin-top:2px;
}
.fl-modal-close:hover { background:rgba(255,255,255,0.08); color:var(--txt); }

.fl-modal-body {
  flex:1; overflow-y:auto; padding:18px 26px;
  display:flex; flex-direction:column; gap:18px;
}

.fl-modal-round-label {
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--txt-dim);
  padding-bottom:8px; margin-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.fl-modal-ex-row {
  display:flex; align-items:center; gap:13px;
  padding:11px 14px; border-radius:10px; margin-bottom:4px;
  cursor:pointer; transition:background 0.1s;
  background:rgba(255,255,255,0.03);
  border:1px solid transparent;
}
.fl-modal-ex-row:hover { background:rgba(255,255,255,0.06); }
.fl-modal-ex-row.fl-ex-done     { background:rgba(77,221,142,0.07);  border-color:rgba(77,221,142,0.15); }
.fl-modal-ex-row.fl-ex-modified { background:rgba(255,200,77,0.07);  border-color:rgba(255,200,77,0.18); }

.fl-ex-check {
  width:24px; height:24px; border-radius:7px; flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; transition:all 0.12s;
}
.fl-ex-done     .fl-ex-check { background:rgba(77,221,142,0.15); border-color:#4ddd8e; color:#4ddd8e; }
.fl-ex-modified .fl-ex-check { background:rgba(255,200,77,0.15);  border-color:#ffc84d; color:#ffc84d; }

.fl-ex-name { flex:1; font-size:13px; color:var(--txt); line-height:1.3; }
.fl-ex-done     .fl-ex-name { color:var(--txt-mid); }
.fl-ex-modified .fl-ex-name { color:#ffc84d; }

.fl-ex-mod-tag {
  font-size:10px; font-weight:700; letter-spacing:0.4px;
  color:#ffc84d; background:rgba(255,200,77,0.12);
  border:1px solid rgba(255,200,77,0.25); border-radius:5px;
  padding:2px 7px; display:none;
}
.fl-ex-modified .fl-ex-mod-tag { display:block; }

.fl-ex-reps {
  font-size:12px; font-weight:600; color:var(--txt-dim);
  background:rgba(255,255,255,0.05); padding:3px 10px;

}
.fl-ex-done     .fl-ex-reps { color:#4ddd8e; background:rgba(77,221,142,0.08); }
.fl-ex-modified .fl-ex-reps { color:#ffc84d; background:rgba(255,200,77,0.08); }

.fl-modal-max-body {

}
.fl-modal-max-duration {

}
.fl-modal-max-desc { font-size:13px; color:var(--txt-dim); }

.fl-modal-foot {

}
.fl-modal-log-row { display:flex; align-items:center; gap:12px; }
.fl-modal-log-label { font-size:11px; font-weight:600; color:var(--txt-dim); letter-spacing:0.3px; width:80px; flex-shrink:0; }

.fl-ex-time-inp {
  width:72px; padding:4px 8px; border-radius:7px;

}

.fl-ex-time-inp::placeholder { color:var(--txt-dim); font-size:11px; }
.fl-ex-done     .fl-ex-time-inp { border-color:rgba(77,221,142,0.20); }
.fl-ex-modified .fl-ex-time-inp { border-color:rgba(255,200,77,0.20); }

.fl-modal-total-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 18px; border-radius:12px;
  background:rgba(255,107,53,0.06); border:1px solid rgba(255,107,53,0.15);
}
.fl-modal-total-label { font-size:11px; font-weight:700; letter-spacing:0.5px; color:var(--txt-dim); }
.fl-modal-total-val {

/* ── History tab layout ── */
.fl-panel-nav {
  display:flex; gap:0; padding:0 28px; flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.015);
}
.fl-panel-nav-btn {
  padding:12px 20px; background:transparent; border:none;
  border-bottom:2px solid transparent; color:var(--txt-dim);

  letter-spacing:0.2px; margin-bottom:-1px;
  transition:color 0.15s, border-color 0.15s;
}
.fl-panel-nav-btn:hover { color:var(--txt-mid); }
.fl-panel-nav-btn.active { color:#ff8050; border-bottom-color:#ff8050; }

.fl-subpanel { flex:1; display:flex; min-height:0; overflow:hidden; }
.fl-hist-outer { flex-direction:column; }

.fl-hist-subtabs {
  display:flex; gap:6px; padding:14px 22px;

}
.fl-hist-subtab:hover { border-color:rgba(255,255,255,0.22); color:var(--txt-mid); }
.fl-hist-subtab.active { border-color:rgba(255,107,53,0.40); background:rgba(255,107,53,0.10); color:#ff8050; }

.fl-hist-split { display:flex; flex:1; overflow:hidden; }

.fl-hist-list-pane {
  width:210px; flex-shrink:0; border-right:1px solid rgba(255,255,255,0.07);
  overflow-y:auto; display:flex; flex-direction:column; gap:2px; padding:12px 8px;
}
.fl-hist-search-wrap { padding:0 4px 8px; flex-shrink:0; }
.fl-hist-search {
  width:100%; padding:7px 11px; border-radius:8px; outline:none;

}
.fl-hist-search:focus { border-color:rgba(255,107,53,0.35); }
.fl-hist-search::placeholder { color:var(--txt-dim); }
.fl-hist-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:8px; cursor:pointer; transition:background 0.1s;
}
.fl-hist-item:hover { background:rgba(255,255,255,0.05); }
.fl-hist-item.active { background:rgba(255,107,53,0.10); }
.fl-hist-item.active .fl-hist-item-name { color:#ff8050; font-weight:700; }
.fl-hist-item-name { font-size:13px; color:var(--txt-mid); flex:1; }
.fl-hist-item-badge {
  font-size:10px; font-weight:700; color:var(--txt-dim);

.fl-hist-detail-pane { flex:1; overflow-y:auto; padding:24px 32px; }

}
.fl-hist-detail-header { margin-bottom:20px; }
.fl-hist-detail-title { font-size:22px; font-weight:700; color:#ff8050; letter-spacing:-0.4px; margin-bottom:4px; }
.fl-hist-detail-meta { font-size:11px; color:var(--txt-dim); line-height:1.6; }

.fl-hist-graph-wrap {
  background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.07);

}
.fl-graph-empty {
  height:200px; display:flex; align-items:center; justify-content:center;

}
.fl-graph-label {

.fl-hist-table { display:flex; flex-direction:column; gap:4px; }

.fl-modal-total-val.dim { color:var(--txt-dim); font-size:20px; }

/* ── Level control ── */
.fl-level-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; padding:16px 18px; margin-bottom:14px;
}
.fl-level-round-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;

.fl-level-btn {

}
.fl-level-btn:hover:not(:disabled) { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.25); }
.fl-level-btn:disabled { opacity:0.25; cursor:not-allowed; }
.fl-level-num { font-size:22px; font-weight:700; color:#ff8050; letter-spacing:-0.5px; min-width:22px; text-align:center; }
.fl-level-pct { font-size:13px; font-weight:600; color:var(--txt-mid); }
.fl-level-pips { display:flex; gap:3px; margin-bottom:8px; }
.fl-level-pip { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,0.07); transition:background 0.2s; }
.fl-level-pip.on { background:#ff8050; }
.fl-level-desc { font-size:11px; color:var(--txt-dim); line-height:1.5; }
.fl-new-round-btn {
  width:100%; margin-top:12px; padding:7px 0; border-radius:8px;

}
.fl-new-round-btn:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.22); color:var(--txt-mid); }

.fl-ex-reps-full { font-size:10px; font-weight:400; color:var(--txt-dim); margin-left:3px; opacity:0.65; }
.fl-modal-level-hint {
  font-size:11px; color:var(--txt-dim); padding:6px 14px 2px;

}

.fl-modal-timer-bar {
  display:none; flex-shrink:0; align-items:center; gap:10px;

}

.fl-sw-ex-name {

}
.fl-sw-ex-name.selected { color:#ff8050; font-style:normal; font-weight:600; }
.fl-sw-clock {
  font-size:20px; font-weight:700; letter-spacing:-0.5px;
  font-variant-numeric:tabular-nums; color:var(--txt-mid);

}
.fl-sw-clock.running { color:#ff8050; }
.fl-sw-btn {
  padding:5px 14px; border-radius:8px; cursor:pointer; flex-shrink:0;
  font-size:12px; font-weight:700; letter-spacing:0.3px; font-family:inherit;
  border:1.5px solid; transition:background 0.15s, border-color 0.15s;
}
.fl-sw-btn:disabled { opacity:0.25; cursor:not-allowed; }
.fl-sw-go { border-color:rgba(77,221,142,0.30); background:rgba(77,221,142,0.07); color:#4ddd8e; }
.fl-sw-go:not(:disabled):hover { background:rgba(77,221,142,0.16); border-color:rgba(77,221,142,0.55); }
.fl-sw-go.paused { border-color:rgba(255,200,77,0.30); background:rgba(255,200,77,0.07); color:#ffc84d; }
.fl-sw-go.paused:not(:disabled):hover { background:rgba(255,200,77,0.16); border-color:rgba(255,200,77,0.55); }
.fl-sw-stop { border-color:rgba(255,107,53,0.25); background:rgba(255,107,53,0.05); color:#ff8050; }
.fl-sw-stop:not(:disabled):hover { background:rgba(255,107,53,0.15); border-color:rgba(255,107,53,0.50); }
.fl-modal-ex-row.fl-ex-selected { box-shadow:0 0 0 2px rgba(255,107,53,0.50); }


.fl-hist-empty { padding:40px 0; text-align:center; color:var(--txt-dim); font-size:13px; font-style:italic; }

.fl-hist-section-title {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--txt-dim); padding-bottom:10px; margin-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.fl-hist-session { border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,0.07); }
.fl-hist-session + .fl-hist-session { margin-top:6px; }
.fl-hist-session-row {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; cursor:pointer; transition:background 0.1s;
  background:rgba(255,255,255,0.02); user-select:none;
}
.fl-hist-session-row:hover { background:rgba(255,255,255,0.05); }
.fl-hist-date { font-size:12px; color:var(--txt-dim); flex-shrink:0; width:88px; }
.fl-hist-val  { font-size:15px; font-weight:700; color:var(--txt); font-variant-numeric:tabular-nums; flex:1; }
.fl-hist-level   { font-size:11px; font-weight:700; color:rgba(255,200,77,0.75); flex-shrink:0; width:24px; text-align:right; }
.fl-hist-norm    { font-size:12px; color:rgba(255,200,77,0.5); flex-shrink:0; width:58px; font-variant-numeric:tabular-nums; }
.fl-hist-workout { font-size:11px; color:rgba(255,107,53,0.65); flex-shrink:0; max-width:72px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fl-hist-trend { font-size:11px; font-weight:700; flex-shrink:0; }
.fl-hist-trend.better { color:#4ddd8e; }
.fl-hist-trend.worse  { color:#ff5050; }
.fl-hist-trend.same   { color:var(--txt-dim); }
.fl-hist-chevron { font-size:10px; color:var(--txt-dim); flex-shrink:0; width:10px; }

.fl-hist-detail {
  display:none; padding:10px 14px 14px;
  border-top:1px solid rgba(255,255,255,0.05);
  background:rgba(0,0,0,0.18);
}
.fl-hist-detail.open { display:block; }
.fl-hist-detail-round {
  font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
  color:var(--txt-dim); margin:10px 0 4px;
}
.fl-hist-detail-round:first-child { margin-top:2px; }
.fl-hist-detail-ex-row { display:flex; align-items:center; gap:8px; padding:3px 0; }
.fl-hist-detail-ex   { font-size:12px; color:var(--txt-mid); flex:1; }
.fl-hist-detail-time { font-size:12px; font-weight:600; color:var(--txt); font-variant-numeric:tabular-nums; }
.fl-hist-detail-state{ font-size:11px; flex-shrink:0; width:14px; text-align:center; }

.fl-hist-ex-section { margin-top:22px; }
.fl-hist-ex-block { margin-bottom:14px; }
.fl-hist-ex-name {
  font-size:12px; font-weight:700; color:var(--txt-mid);
  margin-bottom:5px; letter-spacing:0.2px;
}
.fl-hist-ex-row {
  display:flex; align-items:center; gap:10px;
  padding:4px 10px; border-radius:7px;
  background:rgba(255,255,255,0.02); margin-bottom:2px;
}
.fl-hist-ex-date { font-size:11px; color:var(--txt-dim); width:80px; flex-shrink:0; }
.fl-hist-ex-time { font-size:13px; font-weight:600; color:var(--txt); font-variant-numeric:tabular-nums; flex:1; }
.fl-hist-ex-trend { font-size:11px; font-weight:700; flex-shrink:0; }
.fl-hist-ex-trend.better { color:#4ddd8e; }
.fl-hist-ex-trend.worse  { color:#ff5050; }
.fl-hist-ex-trend.same   { color:var(--txt-dim); }

.fl-timer-btn {

}

/* ══════════════════════════════════════════════════════
   CHRONICLE (TAB 6)
══════════════════════════════════════════════════════ */
.chronicle-wrap {
  flex: 1; display: flex; flex-direction: row; overflow: hidden;
}

/* ── Left column ── */
.chronicle-left {
  flex: 0 0 50%; display: flex; flex-direction: column;
  border-right: 1px solid var(--line); overflow: hidden;
}

.chronicle-header {
  padding: 18px 32px 14px; border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.chronicle-heading {
  font-size: 13px; font-weight: 600;
  color: var(--txt-mid); letter-spacing: 0.5px;
}

.chronicle-sub {
  font-size: 12px; color: var(--txt-dim);
  margin-top: 3px; letter-spacing: 0.2px;
}

.chronicle-list { flex: 1; overflow-y: auto; }

/* ── Right column: year calendar ── */
.chronicle-right {
  flex: 0 0 50%; overflow-y: auto;
  padding: 28px 32px 32px;
}

.chronicle-cal-heading {
  font-size: 13px; font-weight: 600;
  color: var(--txt-mid); letter-spacing: 0.5px;
  margin-bottom: 22px;
}

.chronicle-months {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px 20px;
}

.chron-month {}

.chron-month-name {
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--txt-dim); text-transform: uppercase;
  margin-bottom: 8px;
}

.chron-month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.chron-dow {
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.18);
  text-align: center; letter-spacing: 0.3px; padding-bottom: 3px;
}

.chron-day {
  aspect-ratio: 1;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: rgba(255,255,255,0.28);
  cursor: default;
  transition: background 0.12s;
  position: relative;
}

.chron-day.today {
  color: #ff8fab;
  font-weight: 700;
  box-shadow: 0 0 0 1px rgba(255,139,175,0.35);
}

.chron-day.future { color: rgba(255,255,255,0.10); }

.chron-day.r1 { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.75); }
.chron-day.r2 { background: rgba(255,200,77,0.22);  color: #ffc84d; }
.chron-day.r3 { background: rgba(255,139,175,0.22); color: #ff8fab; }
.chron-day.r4 { background: rgba(192,132,252,0.22); color: #c084fc; }

.chronicle-entry {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 14px 32px;
  border-bottom: 1px solid rgba(255,255,255,0.035);
  transition: background 0.1s;
}
.chronicle-entry:hover { background: rgba(255,255,255,0.012); }
.chronicle-entry.today { background: rgba(255,139,175,0.025); }

.chronicle-date {
  width: 100px; flex-shrink: 0; padding-top: 10px;
}

.chronicle-date-day {
  font-size: 13px; font-weight: 600;
  color: var(--txt-mid); letter-spacing: -0.2px;
}

.chronicle-date-wd {
  font-size: 11px; color: var(--txt-dim);
  letter-spacing: 0.3px; margin-top: 2px;
}

.chronicle-entry.today .chronicle-date-day { color: #ff8fab; }
.chronicle-entry.today .chronicle-date-wd  { color: rgba(255,139,175,0.55); }

.chronicle-textarea {
  flex: 1; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
  padding: 10px 14px; color: var(--txt); font-size: 13px;
  line-height: 1.65; font-family: inherit; resize: none;
  overflow: hidden; min-height: 56px; outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.chronicle-textarea:focus {
  border-color: rgba(255,139,175,0.35);
  background: rgba(255,255,255,0.045);
}
.chronicle-textarea::placeholder { color: var(--txt-dim); font-style: italic; }
.chronicle-entry.today .chronicle-textarea { border-color: rgba(255,139,175,0.13); }
.chronicle-entry.today .chronicle-textarea:focus { border-color: rgba(255,139,175,0.42); }

.chronicle-rating-btn {
  margin-top: 8px;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.10);
  background: transparent;
  color: rgba(255,255,255,0.22);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
}
.chronicle-rating-btn:hover {
  border-color: rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.40);
}
.chronicle-rating-btn.r1 { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.05); }
.chronicle-rating-btn.r2 { color: #ffc84d; border-color: rgba(255,200,77,0.45); background: rgba(255,200,77,0.07); }
.chronicle-rating-btn.r3 { color: #ff8fab; border-color: rgba(255,139,175,0.50); background: rgba(255,139,175,0.08); }
.chronicle-rating-btn.r4 { color: #c084fc; border-color: rgba(192,132,252,0.50); background: rgba(192,132,252,0.08); }

.chronicle-entry.rating-1 { box-shadow: inset 3px 0 0 rgba(255,255,255,0.18); }
.chronicle-entry.rating-2 { box-shadow: inset 3px 0 0 rgba(255,200,77,0.55); }
.chronicle-entry.rating-3 { box-shadow: inset 3px 0 0 rgba(255,139,175,0.60); }
.chronicle-entry.rating-4 { box-shadow: inset 3px 0 0 rgba(192,132,252,0.65); }

.chronicle-entry-body { flex: 1; display: flex; flex-direction: column; gap: 6px; }

.chronicle-save-btn {

/* ── TODAY DASHBOARD ──────────────────────────────── */
#panel-today { overflow-y: auto; }
.today-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 32px 48px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Header */
.today-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
}
.today-greeting { font-size: 13px; color: var(--txt-dim); margin-bottom: 4px; letter-spacing: 0.3px; }
.today-date     { font-size: 26px; font-weight: 700; color: var(--txt); line-height: 1.1; }
.today-time     { font-size: 36px; font-weight: 200; color: var(--txt-mid); letter-spacing: -1px; line-height: 1; }

/* Grid */
.today-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  align-items: start;
}
.today-col { display: flex; flex-direction: column; gap: 16px; }

/* Cards */
.today-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.today-card-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--txt-dim);
}

/* Schedule */
.today-sched-list { display: flex; flex-direction: column; gap: 5px; }
.today-sched-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  border-radius: 8px;
  transition: background 0.1s;
}
.today-sched-item.is-past   { opacity: 0.3; }
.today-sched-item.is-now    { background: rgba(255,255,255,0.06); }
.today-sched-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.today-sched-label { font-size: 13px; color: var(--txt); flex: 1; }
.today-sched-item.is-now .today-sched-label { font-weight: 600; }
.today-sched-time  { font-size: 11px; color: var(--txt-dim); white-space: nowrap; }
.today-sched-now-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ff8fab;
  flex-shrink: 0;
  box-shadow: 0 0 6px #ff8fab;
}
.today-sched-empty { font-size: 13px; color: var(--txt-dim); padding: 8px 0; }

/* Habits */
.today-pct-row { display: flex; align-items: baseline; gap: 8px; }
.today-pct-num { font-size: 38px; font-weight: 700; line-height: 1; }
.today-pct-num.p0   { color: var(--txt-dim); }
.today-pct-num.plow { color: #ff6b5b; }
.today-pct-num.pmid { color: #ffc84d; }
.today-pct-num.phi  { color: #4ddd8e; }
.today-pct-label { font-size: 12px; color: var(--txt-dim); }
.today-prog-bar {
  height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.07);
  overflow: hidden;
}
.today-prog-fill {
  height: 100%; border-radius: 2px;
  background: #4ddd8e;
  transition: width 0.4s ease;
}
.today-habits-list { display: flex; flex-direction: column; gap: 4px; }
.today-habit-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 6px; border-radius: 7px; cursor: pointer;
  transition: background 0.1s;
}
.today-habit-item:hover { background: rgba(255,255,255,0.05); }
.today-habit-item.done      { opacity: 0.38; }
.today-habit-item.discarded { opacity: 0.22; }
.today-habit-item.discarded .today-habit-box { background: transparent; border-color: rgba(255,255,255,0.12); }
.today-habit-item.discarded .today-habit-box::after { content: '–'; font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1; }
.today-habit-item.discarded .today-habit-name { text-decoration: line-through; }
.today-habit-box {
  width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #fff;
}
.today-habit-item.done .today-habit-box { background: #1c4530; border-color: transparent; }
.today-habit-item.done .today-habit-box::after { content: '✓'; }
.today-habit-name { font-size: 12px; color: var(--txt-mid); }
.today-habits-done { font-size: 12px; color: var(--txt-dim); padding: 4px 0; }
.today-goals-list { display: flex; flex-direction: column; gap: 14px; }
.today-goal-block { display: flex; flex-direction: column; gap: 6px; }
.today-goal-head  { display: flex; align-items: center; gap: 7px; }
.today-goal-icon  { font-size: 16px; line-height: 1; }
.today-goal-title { font-size: 13px; font-weight: 600; color: var(--txt); flex: 1; }
.today-goal-level { font-size: 10px; color: var(--txt-dim); }
.today-goal-habits { display: flex; flex-direction: column; gap: 3px; }
.today-goal-habit { display: flex; align-items: center; gap: 7px; cursor: pointer; padding: 2px 0; }
.today-goal-habit:hover .today-habit-box { border-color: rgba(255,255,255,0.35); }
.today-goal-habit.done .today-habit-box  { background: var(--goal-color); border-color: var(--goal-color); }
.today-goal-habit.done .today-habit-box::after { content: '✓'; font-size: 10px; color: #111; font-weight: 700; }
.today-goal-habit.done .today-habit-name { opacity: 0.45; text-decoration: line-through; }
.today-goal-prog-bar  { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; margin-top: 2px; }
.today-goal-prog-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

/* Backlog */
.today-bl-list { display: flex; flex-direction: column; gap: 6px; }
.today-bl-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 9px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
}
.today-bl-text  { flex: 1; font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.today-bl-days  { font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.today-bl-days.overdue { color: #ff6b5b; }
.today-bl-days.due     { color: #ffc84d; }
.today-bl-done {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  border: 1px solid rgba(77,221,142,0.25); background: transparent;
  cursor: pointer; font-size: 11px; color: rgba(77,221,142,0.5);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.today-bl-done:hover { background: rgba(77,221,142,0.12); color: #4ddd8e; }
.today-bl-empty { font-size: 13px; color: var(--txt-dim); padding: 4px 0; }
.today-bl-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 0; }
.today-bl-section-label.overdue { color: rgba(255,107,91,0.70); }
.today-bl-section-label.due     { color: rgba(255,200,77,0.70); }

/* Chronicle */
.today-chron-yesterday {
  padding: 10px 14px;
  border-radius: 9px;
  background: rgba(255,255,255,0.03);
  border-left: 3px solid rgba(255,255,255,0.12);
  font-size: 12px;
  color: var(--txt-dim);
  line-height: 1.5;
}
.today-chron-yesterday.r1 { border-color: rgba(255,255,255,0.35); }
.today-chron-yesterday.r2 { border-color: rgba(255,200,77,0.55); }
.today-chron-yesterday.r3 { border-color: rgba(255,139,175,0.60); }
.today-chron-yesterday.r4 { border-color: rgba(192,132,252,0.65); }
.today-chron-yd-label { font-size: 10px; color: var(--txt-dim); margin-bottom: 4px; letter-spacing: 0.4px; }
.today-chron-yd-text  { color: var(--txt-mid); font-style: italic; }
.today-chron-input-row { display: flex; flex-direction: column; gap: 8px; }
.today-chron-textarea {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 9px;
  padding: 10px 14px;
  color: var(--txt);
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.5;
  height: 72px;
  transition: border-color 0.15s;
}
.today-chron-textarea:focus { border-color: rgba(255,139,175,0.35); }
.today-chron-textarea::placeholder { color: var(--txt-dim); }
.today-chron-bottom { display: flex; align-items: center; gap: 10px; }
.today-chron-save-btn {
  padding: 4px 14px; border-radius: 8px;
  border: 1px solid rgba(255,139,175,0.22); background: rgba(255,139,175,0.06);
  color: rgba(255,139,175,0.70); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit; letter-spacing: 0.3px;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.today-chron-save-btn:hover {
  background: rgba(255,139,175,0.14); border-color: rgba(255,139,175,0.45); color: #ff8fab;
}
.today-chron-saved-ok {
  font-size: 11px; color: #4ddd8e; margin-left: auto; opacity: 0; transition: opacity 0.3s;
}
.today-chron-saved-ok.visible { opacity: 1; }
</style>

<script>
// ═══════════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
//  TODAY DASHBOARD
// ═══════════════════════════════════════════════════
const EV_COLORS = {
  sleep:'#5b8eff', work:'#ff6b5b', workout:'#4ddd8e', learning:'#ffc84d',
  hygiene:'#40c0e0', family:'#4dddce', sports:'#a06bff', walk:'#5ddd78',
  errands:'#c46bff', social:'#ff8c5b', free:'#7880aa',
};

function renderToday() {
  const now     = new Date();
  const todayDs = now.toISOString().split('T')[0];
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const hour    = now.getHours();

  // ── Header ──────────────────────────────────────
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : hour < 21 ? 'Good evening' : 'Good night';
  document.getElementById('today-greeting').textContent = greet;
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  document.getElementById('today-time').textContent =
    now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });

  const grid = document.getElementById('today-grid');
  grid.innerHTML = '';

  const col1 = document.createElement('div'); col1.className = 'today-col';
  const col2 = document.createElement('div'); col2.className = 'today-col';
  const col3 = document.createElement('div'); col3.className = 'today-col';
  grid.append(col1, col2, col3);

  // ── Card builder ────────────────────────────────
  function card(title, col) {
    const c = document.createElement('div');
    c.className = 'today-card';
    const t = document.createElement('div');
    t.className   = 'today-card-title';
    t.textContent = title;
    c.appendChild(t);
    col.appendChild(c);
    return c;
  }

  // ══ SCHEDULE ═══════════════════════════════════
  const schedCard = card('Today\'s Schedule', col1);
  const list = document.createElement('div');
  list.className = 'today-sched-list';

  const todayBlocks = BLOCKS.filter(b => {
    const days = b.days ?? [b.day ?? 0];
    if (!days.includes(TODAY_IDX)) return false;
    if (b.altSat && TODAY_IDX === 5 && isoWeek(WEEK_DATES[5]) % 2 === 0) return false;
    const s = toMins(b.start), e = toMins(b.end);
    return s >= 0 && e > 0 && b.label !== 'Sleep';
  }).sort((a, b) => toMins(a.start) - toMins(b.start));

  if (!todayBlocks.length) {
    const e = document.createElement('div');
    e.className   = 'today-sched-empty';
    e.textContent = 'No events today.';
    list.appendChild(e);
  } else {
    todayBlocks.forEach(b => {
      const s = toMins(b.start), e = toMins(b.end);
      const isPast = e   < nowMins;
      const isNow  = s  <= nowMins && e > nowMins;
      const row = document.createElement('div');
      row.className = 'today-sched-item' + (isPast ? ' is-past' : isNow ? ' is-now' : '');
      const dot = document.createElement('div');
      dot.className   = 'today-sched-dot';
      dot.style.background = EV_COLORS[b.category] || '#7880aa';
      const lbl = document.createElement('span');
      lbl.className   = 'today-sched-label';
      lbl.textContent = b.label;
      const time = document.createElement('span');
      time.className   = 'today-sched-time';
      time.textContent = `${b.start} – ${b.end}`;
      row.append(dot, lbl, time);
      if (isNow) {
        const pip = document.createElement('div');
        pip.className = 'today-sched-now-pip';
        row.appendChild(pip);
      }
      list.appendChild(row);
    });
  }
  schedCard.appendChild(list);

  // ══ HABITS ═════════════════════════════════════
  const habCard = card('Habits Today', col2);
  const appActs  = ACTIVITIES.filter(a => trApplicable(a, now));
  const discarded = appActs.filter(a => trGetState(todayDs, a.key) === 'x');
  const active    = appActs.filter(a => trGetState(todayDs, a.key) !== 'x');
  const done      = active.filter(a => trGetState(todayDs, a.key) === '1');
  const pct       = active.length ? Math.round(done.length / active.length * 100) : 0;
  const pClass    = pct === 0 ? 'p0' : pct < 50 ? 'plow' : pct < 100 ? 'pmid' : 'phi';

  const pctRow = document.createElement('div');
  pctRow.className = 'today-pct-row';
  const pctNum = document.createElement('span');
  pctNum.className   = `today-pct-num ${pClass}`;
  pctNum.textContent = `${pct}%`;
  const pctLbl = document.createElement('span');
  pctLbl.className   = 'today-pct-label';
  pctLbl.textContent = `${done.length} of ${active.length} done`;
  pctRow.append(pctNum, pctLbl);
  habCard.appendChild(pctRow);

  const bar = document.createElement('div');
  bar.className = 'today-prog-bar';
  const fill = document.createElement('div');
  fill.className = 'today-prog-fill';
  fill.style.width = `${pct}%`;
  fill.style.background = pct < 50 ? '#ff6b5b' : pct < 100 ? '#ffc84d' : '#4ddd8e';
  bar.appendChild(fill);
  habCard.appendChild(bar);

  const habList = document.createElement('div');
  habList.className = 'today-habits-list';
  appActs.forEach(act => {
    const state      = trGetState(todayDs, act.key);
    const isDone     = state === '1';
    const isDiscard  = state === 'x';
    const item = document.createElement('div');
    item.className = 'today-habit-item' + (isDone ? ' done' : isDiscard ? ' discarded' : '');
    const box  = document.createElement('div');  box.className = 'today-habit-box';
    const name = document.createElement('span'); name.className = 'today-habit-name'; name.textContent = act.label;
    item.append(box, name);
    item.addEventListener('click', () => {
      const cur  = trGetState(todayDs, act.key);
      const next = cur === null ? '1' : cur === '1' ? 'x' : null;
      trSetState(todayDs, act.key, next);
      renderToday();
    });
    habList.appendChild(item);
  });
  if (appActs.every(a => trGetState(todayDs, a.key) === '1')) {
    const d = document.createElement('div');
    d.className = 'today-habits-done'; d.textContent = 'All habits done!';
    habList.appendChild(d);
  }
  habCard.appendChild(habList);

  // ══ GOALS ═══════════════════════════════════════
  const goalsCard = card('Goals', col3);
  const goalsList  = document.createElement('div');
  goalsList.className = 'today-goals-list';
  loadGoals().forEach(goal => {
    const activeIdx = goal.levels.findIndex((lv, i) => isLevelUnlocked(goal, i) && !lv.passedDate);
    if (activeIdx === -1) return; // all levels passed
    const level = goal.levels[activeIdx];
    const todayChecks = goal.checks;

    const block = document.createElement('div');
    block.className = 'today-goal-block';

    const head = document.createElement('div'); head.className = 'today-goal-head';
    const ico  = document.createElement('span'); ico.className = 'today-goal-icon'; ico.textContent = goal.icon || '🎯';
    const tit  = document.createElement('span'); tit.className = 'today-goal-title'; tit.textContent = goal.title;
    const lv   = document.createElement('span'); lv.className  = 'today-goal-level'; lv.textContent  = `Lv ${level.num} · ${level.title}`;
    head.append(ico, tit, lv);

    const habitsDiv = document.createElement('div'); habitsDiv.className = 'today-goal-habits';
    const done = level.habits.filter(h => (todayChecks[h.id] || {})[todayDs]).length;
    const total = level.habits.length;

    level.habits.forEach(habit => {
      const checked = !!(todayChecks[habit.id] || {})[todayDs];
      const row = document.createElement('div');
      row.className = 'today-goal-habit' + (checked ? ' done' : '');
      row.style.setProperty('--goal-color', goal.color);
      const box  = document.createElement('div');  box.className = 'today-habit-box';
      const name = document.createElement('span'); name.className = 'today-habit-name'; name.textContent = habit.label;
      row.append(box, name);
      row.addEventListener('click', () => {
        const goals = loadGoals();
        const g = goals.find(g => g.id === goal.id);
        if (!g) return;
        if (!g.checks[habit.id]) g.checks[habit.id] = {};
        if (g.checks[habit.id][todayDs]) delete g.checks[habit.id][todayDs];
        else g.checks[habit.id][todayDs] = true;
        saveGoals(goals);
        renderToday();
      });
      habitsDiv.appendChild(row);
    });

    const progBar  = document.createElement('div'); progBar.className = 'today-goal-prog-bar';
    const progFill = document.createElement('div'); progFill.className = 'today-goal-prog-fill';
    progFill.style.width      = total ? `${Math.round(done / total * 100)}%` : '0%';
    progFill.style.background = goal.color;
    progBar.appendChild(progFill);

    block.append(head, habitsDiv, progBar);
    goalsList.appendChild(block);
  });
  if (!goalsList.children.length) {
    const e = document.createElement('div'); e.style.cssText = 'font-size:12px;color:var(--txt-dim);';
    e.textContent = 'No active goals.';
    goalsList.appendChild(e);
  }
  goalsCard.appendChild(goalsList);

  // ══ BACKLOG SPOTLIGHT ═══════════════════════════
  const blCard = card('Urgent & Due', col3);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todoItems = loadBacklog().filter(i => i.status === 'todo' && i.expectedDate);
  const overdue  = todoItems.filter(i => new Date(i.expectedDate+'T00:00:00') < today0)
                            .sort((a, b) => a.expectedDate.localeCompare(b.expectedDate));
  const dueSoon  = todoItems.filter(i => {
    const diff = Math.round((new Date(i.expectedDate+'T00:00:00') - today0) / 86400000);
    return diff >= 0 && diff <= 7;
  }).sort((a, b) => a.expectedDate.localeCompare(b.expectedDate));

  const blList = document.createElement('div');
  blList.className = 'today-bl-list';

  const addBlItems = (items, cls, labelText) => {
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.className   = `today-bl-section-label ${cls}`;
    sec.textContent = labelText;
    blList.appendChild(sec);
    items.slice(0, 5).forEach(item => {
      const diff = Math.round((new Date(item.expectedDate+'T00:00:00') - today0) / 86400000);
      const n    = Math.abs(diff);
      const row  = document.createElement('div'); row.className = 'today-bl-item';
      const txt  = document.createElement('span'); txt.className = 'today-bl-text'; txt.textContent = item.text;
      const days = document.createElement('span');
      days.className   = `today-bl-days ${cls}`;
      days.textContent = diff < 0 ? `${n}d overdue` : diff === 0 ? 'Today' : `${n}d left`;
      const btn  = document.createElement('button'); btn.className = 'today-bl-done'; btn.textContent = '✓';
      btn.title = 'Mark done';
      btn.onclick = () => updateBlItem(item.id, { status:'done', completedDate: todayDs });
      row.append(txt, days, btn);
      blList.appendChild(row);
    });
  };

  addBlItems(overdue, 'overdue', '● Overdue');
  addBlItems(dueSoon, 'due',     '● Due this week');

  if (!overdue.length && !dueSoon.length) {
    const e = document.createElement('div'); e.className = 'today-bl-empty';
    e.textContent = 'Nothing urgent — you\'re on top of things.';
    blList.appendChild(e);
  }
  blCard.appendChild(blList);

  // ══ CHRONICLE ═══════════════════════════════════
  const chronCard = card('Chronicle', col3);
  const chronData  = loadChronicle();
  const yesterday  = new Date(now); yesterday.setDate(now.getDate() - 1);
  const ydDs       = yesterday.toISOString().split('T')[0];
  const ydEntry    = chronData[ydDs];
  const todayEntry = chronData[todayDs] || { text:'', rating:0 };

  if (ydEntry && ydEntry.text && ydEntry.text.trim()) {
    const ydBox = document.createElement('div');
    ydBox.className = `today-chron-yesterday${ydEntry.rating ? ' r'+ydEntry.rating : ''}`;
    const ydLbl = document.createElement('div'); ydLbl.className = 'today-chron-yd-label';
    ydLbl.textContent = 'Yesterday';
    const ydTxt = document.createElement('div'); ydTxt.className = 'today-chron-yd-text';
    const preview = ydEntry.text.trim().slice(0, 160) + (ydEntry.text.trim().length > 160 ? '…' : '');
    ydTxt.textContent = `"${preview}"`;
    if (ydEntry.rating) {
      const rl = document.createElement('span');
      rl.style.cssText = 'font-size:10px;margin-left:8px;opacity:0.7;font-style:normal;';
      rl.textContent = CHRONICLE_LEVELS[ydEntry.rating]?.label || '';
      ydTxt.appendChild(rl);
    }
    ydBox.append(ydLbl, ydTxt);
    chronCard.appendChild(ydBox);
  }

  const inputRow = document.createElement('div'); inputRow.className = 'today-chron-input-row';
  const ta = document.createElement('textarea');
  ta.className     = 'today-chron-textarea';
  ta.placeholder   = 'How\'s today going? Jot a note…';
  ta.value         = todayEntry.text || '';
  ta.addEventListener('input', () => saveChronicleText(todayDs, ta.value));
  inputRow.appendChild(ta);

  const bottom = document.createElement('div'); bottom.className = 'today-chron-bottom';
  const rBtn = document.createElement('button');
  const curR = todayEntry.rating || 0;
  rBtn.className   = 'chronicle-rating-btn' + (curR ? ` r${curR}` : '');
  rBtn.textContent = curR ? CHRONICLE_LEVELS[curR].label : 'Rate';
  rBtn.addEventListener('click', () => {
    const next = curR >= 4 ? 0 : curR + 1;
    saveChronicleRating(todayDs, next);
    renderToday();
  });

  const todaySavedOk = document.createElement('span');
  todaySavedOk.className = 'today-chron-saved-ok';
  todaySavedOk.textContent = 'Saved ✓';

  const todaySaveBtn = document.createElement('button');
  todaySaveBtn.className = 'today-chron-save-btn';
  todaySaveBtn.textContent = 'Save';
  todaySaveBtn.addEventListener('click', () => {
    saveChronicleText(todayDs, ta.value);
    todaySavedOk.classList.add('visible');
    setTimeout(() => todaySavedOk.classList.remove('visible'), 2000);
  });

  bottom.append(rBtn, todaySaveBtn, todaySavedOk);
  inputRow.appendChild(bottom);
  chronCard.appendChild(inputRow);
}

function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  document.getElementById(`btn-${name}`).classList.add('active');
  if (name === 'today')     renderToday();
  if (name === 'tracker')   buildTracker();
  if (name === 'chronicle') { renderChronicle(); renderChronicleCalendar(); }
}

// ═══════════════════════════════════════════════════
//  SHARED HELPERS
// ═══════════════════════════════════════════════════
function getWeekDates() {
  const today  = new Date();
  const dow    = today.getDay();
  const offset = dow === 0 ? -6 : 1 - dow;
  const mon    = new Date(today);
  mon.setDate(today.getDate() + offset);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

const WEEK_DATES = getWeekDates();
const TODAY_IDX  = (new Date().getDay() + 6) % 7;

// ═══════════════════════════════════════════════════
//  SCHEDULE — HELPERS
// ═══════════════════════════════════════════════════
function toMins(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}
function fmt24(str) {
  const [h, m] = str.split(':').map(Number);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function buildHeader() {
  const wrap = document.getElementById('day-heads');
  DAYS.forEach((name, i) => {
    const col  = document.createElement('div');
    col.className = 'day-head' + (i === TODAY_IDX ? ' today' : '');
    const abbr = document.createElement('span');
    abbr.className   = 'day-abbr';

    const num  = document.createElement('span');
    num.className   = 'day-num';

    col.append(abbr, num);
    wrap.appendChild(col);
  });
}

function buildTimes() {
  const col = document.getElementById('times');
  for (let h = 1; h < 24; h++) {
    const el = document.createElement('div');
    el.className   = 't-label';
    el.textContent = `${String(h).padStart(2,'0')}:00`;
    el.style.top   = `${h * HOUR_H}px`;
    col.appendChild(el);
  }
}

// ═══════════════════════════════════════════════════
//  SCHEDULE — OVERLAP LAYOUT
// ═══════════════════════════════════════════════════
function layoutDayBlocks(blocks) {
  if (!blocks.length) return [];

  const items = blocks.map((b, i) => ({
    b, i,
    start: toMins(b.start),
    end:   toMins(b.end),
    lane:  0,
    total: 1,
  }));

  // Group by the clock-hour the block starts in — blocks sharing an hour sit side by side
  const hourGroups = {};
  items.forEach(item => {
    const h = Math.floor(item.start / 60);
    (hourGroups[h] = hourGroups[h] || []).push(item);
  });

  Object.values(hourGroups).forEach(group => {
    group.sort((a, b) => a.start - b.start);
    group.forEach((item, idx) => {
      item.lane  = idx;
      item.total = group.length;
    });
  });

  const result = new Array(blocks.length);
  items.forEach(it => { result[it.i] = it; });
  return result;
}
