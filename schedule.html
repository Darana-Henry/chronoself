  const logs = flLoadLogs();
  const savedEx = logs[sessionId]?.exercises?.[name] || [];

  if (def.logType === 'max') {
    const durSecs = flParseDuration(def.duration);
    flTimerSecs   = durSecs;
    flTimerRunning = false;
    clearInterval(flTimerInterval); flTimerInterval = null;

    const maxDiv = document.createElement('div');
    maxDiv.className = 'fl-modal-max-body';

    const dur = document.createElement('span');
    dur.className = 'fl-modal-max-duration';
    dur.id = 'fl-timer-display';
    dur.textContent = flSecsToMMSS(durSecs);

    const desc = document.createElement('div');
    desc.className = 'fl-modal-max-desc';
    desc.textContent = 'Complete as many reps as possible. No breaks.';

    const timerBtn = document.createElement('button');
    timerBtn.className = 'fl-timer-btn';
    timerBtn.id = 'fl-timer-btn';
    timerBtn.textContent = 'Start';
    timerBtn.onclick = flToggleTimer;

    maxDiv.append(dur, desc, timerBtn);
    body.appendChild(maxDiv);
  } else {
    const level   = flLoadLevel();
    const touched = flIsSessionTouched(sessionId);

    if (!touched && level < 10) {
      const hint = document.createElement('div'); hint.className = 'fl-modal-level-hint';
      hint.textContent = 'Level ' + level + ' (' + (level * 10) + '%) — targets scaled from full workout.';
      body.appendChild(hint);
    }

    def.rounds.forEach((round, ri) => {
      const roundEl = document.createElement('div');
      const lbl = document.createElement('div');
      lbl.className = 'fl-modal-round-label'; lbl.textContent = round.label;
      roundEl.appendChild(lbl);

      round.sets.forEach((set, si) => {
        // Find saved state for this exercise
        const saved = savedEx.find(e => e.ri === ri && e.si === si);
        const initState = saved?.state || 'none';

        const row = document.createElement('div');
        row.className = 'fl-modal-ex-row' + (initState === 'done' ? ' fl-ex-done' : initState === 'modified' ? ' fl-ex-modified' : '');
        row.dataset.ri    = ri;
        row.dataset.si    = si;
        row.dataset.state = initState;

        const check = document.createElement('div');
        check.className = 'fl-ex-check';
        check.textContent = initState === 'done' ? '✓' : initState === 'modified' ? '~' : '';

        const exName = document.createElement('span');
        exName.className = 'fl-ex-name'; exName.textContent = set.ex;

        const modTag = document.createElement('span');
        modTag.className = 'fl-ex-mod-tag'; modTag.textContent = 'MODIFIED';

        const exReps = document.createElement('span');
        exReps.className = 'fl-ex-reps';
        if (!touched && typeof set.reps === 'number' && level < 10) {
          const scaled = flScaleReps(set.reps, level);
          exReps.textContent = scaled + ' reps';
          const orig = document.createElement('span'); orig.className = 'fl-ex-reps-full';
          orig.textContent = '/ ' + set.reps;

          exReps.textContent = set.reps + (typeof set.reps === 'number' ? ' reps' : '');

        timeInp.className = 'fl-ex-time-inp';

        timeInp.placeholder = '00:00';

        timeInp.oninput = flRecalcTotal;

        check.onclick = e => { e.stopPropagation(); flCycleExRow(row); };
        row.append(check, exName, modTag, timeInp, exReps);
        row.onclick = e => { if (e.target.classList.contains('fl-ex-time-inp')) return; flSelectExRow(row); };

      });
      body.appendChild(roundEl);
    });

  // ── Footer ───────────────────────────
  const foot = document.getElementById('fl-modal-foot');
  foot.innerHTML = '';

  const prevResult = logs[sessionId]?.results?.find(r => r.name === name);

  const actions = document.createElement('div');
  actions.className = 'fl-log-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'fl-save-btn'; saveBtn.textContent = 'Save';
  saveBtn.onclick = flSaveWorkoutModal;
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'fl-cancel-log-btn'; cancelBtn.textContent = 'Cancel';

    const inp = document.createElement('input');

    totalVal.textContent = '—';

    starRow.className = 'fl-modal-log-row';
    const starLbl = document.createElement('label');

    starCb.type = 'checkbox'; starCb.id = 'fl-modal-star';

function flCycleExRow(row) {
  const order = ['none', 'done', 'modified'];
  const next  = order[(order.indexOf(row.dataset.state) + 1) % order.length];
  row.dataset.state = next;
  row.classList.remove('fl-ex-done', 'fl-ex-modified');
  if (next !== 'none') row.classList.add('fl-ex-' + next);
  const check = row.querySelector('.fl-ex-check');
  check.textContent = next === 'done' ? '✓' : next === 'modified' ? '~' : '';
}

function flCloseWorkoutModal() {
  clearInterval(flTimerInterval); flTimerInterval = null; flTimerRunning = false; flTimerSecs = 0;
  clearInterval(flSwInterval); flSwInterval = null; flSwRunning = false; flSwSecs = 0;
  if (flSelectedRow) { flSelectedRow.classList.remove('fl-ex-selected'); flSelectedRow = null; }
  document.getElementById('fl-modal-timer-bar').classList.remove('active');
  document.getElementById('fl-workout-modal').classList.remove('open');
  flModalCtx = null;
}

function flSaveWorkoutModal() {
  const ctx = flModalCtx;
  if (!ctx) return;
  const def  = FL_WORKOUT_EXERCISES[ctx.name];
  const star = document.getElementById('fl-modal-star')?.checked || false;

  let value = '';
  if (def.logType === 'max') {
    value = document.getElementById('fl-modal-value')?.value.trim() || '';
  } else {
    let totalSecs = 0;
    document.querySelectorAll('#fl-modal-body .fl-ex-time-inp').forEach(inp => {
      totalSecs += flParseMMSS(inp.value);
    });
    value = totalSecs > 0 ? flSecsToMMSS(totalSecs) : '';
  }

  // Collect exercise states + individual times
  const exerciseLog = [];
  document.querySelectorAll('#fl-modal-body .fl-modal-ex-row').forEach(row => {
    const timeInp = row.querySelector('.fl-ex-time-inp');
    exerciseLog.push({ ri: +row.dataset.ri, si: +row.dataset.si, state: row.dataset.state, time: timeInp?.value.trim() || '' });
  });

  const logs = flLoadLogs();
  if (!logs[ctx.sessionId]) logs[ctx.sessionId] = { date: '', results: [], exercises: {} };
  const log = logs[ctx.sessionId];
  log.date  = new Date().toISOString().split('T')[0];
  log.level = flLoadLevel();

  const entry = { name: ctx.name, value, star, isMax: def.logType === 'max' };
  const idx   = (log.results || []).findIndex(r => r.name === ctx.name);
  if (idx >= 0) log.results[idx] = entry; else (log.results = log.results || []).push(entry);

  if (!log.exercises) log.exercises = {};
  log.exercises[ctx.name] = exerciseLog;

  flSaveLogs(logs);
  if (value) renderFLPRs(flUpdatePRs([entry]));
  renderFLProgram();
  flCloseWorkoutModal();
}

// ── Revised session-done check: all unique workouts in session must have a value
function flSessionDone(session, log) {
  if (!log?.results?.length) return false;
  const unique = [...new Set(session.blocks.map(b => b.name))];
  return unique.every(n => log.results.some(r => r.name === n && r.value));
}

const CHRONICLE_LEVELS = [
  null,
  { label: 'Trivial',  color: 'rgba(255,255,255,0.50)' },
  { label: 'Notable',  color: '#ffc84d' },
  { label: 'Rare',     color: '#ff8fab' },
  { label: 'Epic',     color: '#c084fc' },
];

function loadChronicle() {
  try {
    const raw = JSON.parse(localStorage.getItem('chrono_chronicle') || '{}');
    // Migrate old string-only format
    const out = {};
    for (const [k, v] of Object.entries(raw)) {
      out[k] = typeof v === 'string' ? { text: v, rating: 0 } : v;
    }
    return out;
  } catch { return {}; }
}

function saveChronicleText(dateStr, text) {
  const data  = loadChronicle();
  const entry = data[dateStr] || { text: '', rating: 0 };
  entry.text  = text;
  if (!entry.text.trim() && !entry.rating) delete data[dateStr];
  else data[dateStr] = entry;
  localStorage.setItem('chrono_chronicle', JSON.stringify(data));
  fsPushChronicle(data);
}

function saveChronicleRating(dateStr, rating) {
  const data   = loadChronicle();
  const entry  = data[dateStr] || { text: '', rating: 0 };
  entry.rating = rating;
  if (!entry.text.trim() && !entry.rating) delete data[dateStr];
  else data[dateStr] = entry;
  localStorage.setItem('chrono_chronicle', JSON.stringify(data));
  fsPushChronicle(data);
  updateCalendarDay(dateStr, rating);
}

function updateCalendarDay(dateStr, rating) {
  const cell = document.querySelector(`.chron-day[data-date="${dateStr}"]`);
  if (!cell) return;
  cell.classList.remove('r1', 'r2', 'r3', 'r4');
  if (rating) cell.classList.add(`r${rating}`);
}

function renderChronicleCalendar() {
  const cal  = document.getElementById('chronicle-cal');
  if (!cal) return;
  cal.innerHTML = '';
  const data     = loadChronicle();
  const now      = new Date();
  const todayDs  = now.toISOString().split('T')[0];
  const year     = now.getFullYear();

  const heading = document.createElement('div');
  heading.className   = 'chronicle-cal-heading';
  heading.textContent = `${year}`;
  cal.appendChild(heading);

  const grid = document.createElement('div');
  grid.className = 'chronicle-months';

  const DOW_LABELS = ['S','M','T','W','T','F','S'];
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  for (let m = 0; m < 12; m++) {
    const monthEl = document.createElement('div');
    monthEl.className = 'chron-month';

    const nameEl = document.createElement('div');
    nameEl.className   = 'chron-month-name';
    nameEl.textContent = MONTH_NAMES[m];
    monthEl.appendChild(nameEl);

    const mgrid = document.createElement('div');
    mgrid.className = 'chron-month-grid';

    DOW_LABELS.forEach(l => {
      const dow = document.createElement('div');
      dow.className   = 'chron-dow';
      dow.textContent = l;
      mgrid.appendChild(dow);
    });

    const firstDay = new Date(year, m, 1).getDay();
    // blank cells before 1st
    for (let b = 0; b < firstDay; b++) {
      mgrid.appendChild(document.createElement('div'));
    }

    const daysInMonth = new Date(year, m + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const ds     = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const rating = (data[ds] && data[ds].rating) || 0;
      const isToday  = ds === todayDs;
      const isFuture = ds > todayDs;

      const cell = document.createElement('div');
      cell.className = 'chron-day' +
        (isToday  ? ' today'  : '') +
        (isFuture ? ' future' : '') +
        (rating   ? ` r${rating}` : '');
      cell.dataset.date   = ds;
      cell.textContent    = d;
      mgrid.appendChild(cell);
    }

    monthEl.appendChild(mgrid);
    grid.appendChild(monthEl);
  }

  cal.appendChild(grid);
}

function renderChronicle() {
  const list = document.getElementById('chronicle-list');
  if (!list) return;
  list.innerHTML = '';
  const data    = loadChronicle();
  const now     = new Date();
  const todayDs = now.toISOString().split('T')[0];

  for (let i = 0; i <= 5; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const ds      = d.toISOString().split('T')[0];
    const isToday = ds === todayDs;
    const stored  = data[ds] || { text: '', rating: 0 };
    const rating  = stored.rating || 0;

    const entry = document.createElement('div');
    entry.className = 'chronicle-entry' + (isToday ? ' today' : '') + (rating ? ` rating-${rating}` : '');
    entry.dataset.rating = rating;

    // ── Date column ──────────────────────────
    const dateCol = document.createElement('div');
    dateCol.className = 'chronicle-date';

    const dayEl = document.createElement('div');
    dayEl.className = 'chronicle-date-day';
    dayEl.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    const wdEl = document.createElement('div');
    wdEl.className = 'chronicle-date-wd';
    wdEl.textContent = d.toLocaleDateString('en-US', { weekday: 'long' });

    // ── Rating button (cycles: 0→1→2→3→4→0) ─
    const ratingBtn = document.createElement('button');
    ratingBtn.className = 'chronicle-rating-btn' + (rating ? ` r${rating}` : '');
    ratingBtn.textContent = rating ? CHRONICLE_LEVELS[rating].label : 'Rate';
    ratingBtn.addEventListener('click', () => {
      const cur  = parseInt(entry.dataset.rating) || 0;
      const next = cur >= 4 ? 0 : cur + 1;
      entry.classList.remove('rating-1', 'rating-2', 'rating-3', 'rating-4');
      if (next) entry.classList.add(`rating-${next}`);
      entry.dataset.rating = next;
      ratingBtn.className  = 'chronicle-rating-btn' + (next ? ` r${next}` : '');
      ratingBtn.textContent = next ? CHRONICLE_LEVELS[next].label : 'Rate';
      saveChronicleRating(ds, next);
    });

    dateCol.append(dayEl, wdEl, ratingBtn);

    // ── Entry body: textarea + footer ────────
    const body = document.createElement('div');
    body.className = 'chronicle-entry-body';

    const ta = document.createElement('textarea');
    ta.className   = 'chronicle-textarea';
    ta.value       = stored.text || '';
    ta.placeholder = isToday ? 'What was new today?' : 'Nothing noted.';
    ta.rows        = 2;
    ta.spellcheck  = true;

    ta.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
      saveChronicleText(ds, this.value);
    });

    const foot = document.createElement('div');
    foot.className = 'chronicle-entry-foot';

    const savedOk = document.createElement('span');
    savedOk.className = 'chronicle-saved-ok';
    savedOk.textContent = 'Saved ✓';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'chronicle-save-btn';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', () => {
      saveChronicleText(ds, ta.value);
      savedOk.classList.add('visible');
      setTimeout(() => savedOk.classList.remove('visible'), 2000);
    });

    foot.append(savedOk, saveBtn);
    body.append(ta, foot);
    entry.append(dateCol, body);
    list.appendChild(entry);
  }

  // Resize textareas that already have content
  list.querySelectorAll('.chronicle-textarea').forEach(ta => {
    if (ta.value) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
  });
}

// ═══════════════════════════════════════════════════
let fsDb  = null;
let fsUid = null;

function fsUserDoc() {
  return fsDb.collection('users').doc(fsUid);
}

// ── Push functions (fire-and-forget) ────────────────
function fsPushTracker(dateStr) {
  if (!fsDb || !fsUid) return;
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(`chrono_${dateStr}_`)) {
      data[k.replace(`chrono_${dateStr}_`, '')] = localStorage.getItem(k);
    }
  }
  fsUserDoc().collection('tracker').doc(dateStr).set(data)
    .catch(err => console.error('Tracker sync failed:', err));
}

function fsPushBacklog(items) {
  if (!fsDb || !fsUid) return;
  fsUserDoc().collection('data').doc('backlog').set({ items }).catch(console.error);
}

function fsPushGoals(goals) {
  if (!fsDb || !fsUid) return;
  fsUserDoc().collection('data').doc('goals').set({ goals }).catch(console.error);
}

function fsPushChronicle(entries) {
  if (!fsDb || !fsUid) return;
  fsUserDoc().collection('data').doc('chronicle').set({ entries }).catch(console.error);
}

// ── Pull on sign-in ──────────────────────────────────
async function fsPull() {
  const userDoc = fsUserDoc();

  // Tracker — one doc per date
  const trackerSnap = await userDoc.collection('tracker').get();
  trackerSnap.forEach(doc => {
    const dateStr = doc.id;
    Object.entries(doc.data()).forEach(([key, val]) => {
      val ? localStorage.setItem(`chrono_${dateStr}_${key}`, val)
          : localStorage.removeItem(`chrono_${dateStr}_${key}`);
    });
  });

  // Backlog, Goals, Chronicle
  const dataSnap = await userDoc.collection('data').get();
  dataSnap.forEach(doc => {
    if (doc.id === 'backlog'   && doc.data().items)
      localStorage.setItem('chrono_backlog',       JSON.stringify(doc.data().items));
    if (doc.id === 'goals'     && doc.data().goals)
      localStorage.setItem('chrono_goals_v3',      JSON.stringify(doc.data().goals));
    if (doc.id === 'chronicle' && doc.data().entries)
      localStorage.setItem('chrono_chronicle',     JSON.stringify(doc.data().entries));
  });

  // First-time: if Firestore is empty, push existing localStorage data up
  if (dataSnap.empty && trackerSnap.empty) {
    const backlog   = localStorage.getItem('chrono_backlog');
    const goals     = localStorage.getItem('chrono_goals_v3');
    const chronicle = localStorage.getItem('chrono_chronicle');
    if (backlog)   fsPushBacklog(JSON.parse(backlog));
    if (goals)     fsPushGoals(JSON.parse(goals));
    if (chronicle) fsPushChronicle(JSON.parse(chronicle));
  }
}

  renderChronicleCalendar();
  renderFLProgram();
  renderFLPRs();
  renderFLLevelUI();
  renderToday();
  setInterval(renderToday, 60_000);
  const urlTab = new URLSearchParams(window.location.search).get('tab');
  if (urlTab && ['today','tracker','backlog','goals','freeletics','chronicle'].includes(urlTab)) switchTab(urlTab);
}

if (_fbConfigured) {
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth      = firebase.auth();
  const overlay   = document.getElementById('auth-overlay');
  const errEl     = document.getElementById('auth-error');
  const signInBtn = document.getElementById('google-signin-btn');

  signInBtn.addEventListener('click', () => {
    errEl.textContent = '';
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: ALLOWED_EMAIL });
    auth.signInWithPopup(provider).catch(err => {
      errEl.textContent = 'Sign-in failed. Please try again.';
    });
  });

  auth.onAuthStateChanged(async user => {
    if (user && user.email === ALLOWED_EMAIL) {
      overlay.classList.add('hidden');
      if (!document.getElementById('app').dataset.init) {
        document.getElementById('app').dataset.init = '1';
        fsDb  = firebase.firestore();
        fsUid = user.uid;
        await fsPull();
        initApp();
      }
    } else if (user) {
      // Signed in but wrong account
      errEl.textContent = `Access restricted. Sign in as ${ALLOWED_EMAIL}.`;
      auth.signOut();
    } else {
      overlay.classList.remove('hidden');
    }
  });
} else {
  // No Firebase config — running locally, skip auth
  document.getElementById('auth-overlay').classList.add('hidden');
  initApp();
}

// ═══════════════════════════════════════════════════
//  INIT  (moved into initApp() above)
// ═══════════════════════════════════════════════════
</script>
